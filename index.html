    } else {
      const { data: rcpt } = await supabase.rpc('generate_receipt_number', { p_year_id: activeYear.id, p_type: 'TOUT' });
      const voucherNum = Array.isArray(rcpt) ? rcpt[0] : rcpt;
      const { error } = await supabase.from('teacher_payouts').insert({
        voucher_number: voucherNum, teacher_id: form.teacher_id, academic_year_id: activeYear.id,
        amount: amt, balance_before: teacherBalance, balance_after: teacherBalance - amt,
        payout_date: form.payout_date, notes: form.notes, created_by: user.user_id
      });
      if(error) { showToast('خطأ في الحفظ', 'error'); return; }
      logAudit(user, 'إنشاء وصل صرف', 'teacher_payouts', null, voucherNum+' - '+formatMoney(amt)+' د.ع');
      showToast('تم إنشاء وصل الصرف بنجاح');
    }
    setShowModal(false);
    setEditing(null);
    loadData();
  };

  const filtered = payouts.filter(p => {
    const matchSearch = !search || p.teachers?.full_name?.includes(search) || (p.voucher_number||'').includes(search);
    const d = p.payout_date; const matchFrom = !dateFrom || d >= dateFrom; const matchTo = !dateTo || d <= dateTo;
    return matchSearch && matchFrom && matchTo;
  });

  const handleExport = () => {
    exportToExcel(filtered.map(p => [p.voucher_number, p.teachers?.full_name, p.amount, p.balance_before, p.balance_after, p.payout_date, p.creator?.full_name||'']),
    ['رقم الوصل','الأستاذ','المبلغ','الرصيد قبل','الرصيد بعد','التاريخ','بواسطة'], 'صرف_الأساتذة');
  };

  if(loading) return <Loading/>;

  return (
    <div className="fade-in">
      <PageHeader title="صرف الأساتذة" action={hasPerm('payouts.add') ? openAdd : null} actionLabel="وصل صرف جديد"/>
      <div className="card p-4 mb-4 space-y-3">
        <div className="flex items-center gap-3 flex-wrap">
          <div className="flex-1 min-w-[200px]"><SearchInput value={search} onChange={setSearch}/></div>
          <ExportBtn onClick={handleExport}/>
        </div>
        <DateRangeFilter dateFrom={dateFrom} dateTo={dateTo} setDateFrom={setDateFrom} setDateTo={setDateTo}/>
      </div>
      <div className="card table-container">
        <table>
          <thead><tr><th>رقم الوصل</th><th>الأستاذ</th><th>المبلغ</th><th>الرصيد قبل</th><th>الرصيد بعد</th><th>التاريخ</th><th>بواسطة</th><th>إجراءات</th></tr></thead>
          <tbody>
            {paginate(filtered, page).map(p => (
              <tr key={p.id}>
                <td className="font-mono text-sm">{p.voucher_number}</td>
                <td>{p.teachers?.full_name}</td>
                <td className="font-bold text-red-500">{formatMoney(p.amount)} د.ع</td>
                <td>{formatMoney(p.balance_before)} د.ع</td>
                <td>{formatMoney(p.balance_after)} د.ع</td>
                <td>{formatDate(p.payout_date)}</td>
                <td className="text-xs text-gray-500">{p.creator?.full_name || '-'}</td>
                <td><div className="flex gap-2">{hasPerm('payouts.edit') && <button onClick={()=>openEdit(p)} className="text-blue-600">{Icons.edit}</button>}{hasPerm('payouts.delete') && <button onClick={()=>setConfirmDel(p.id)} className="text-red-500">{Icons.trash}</button>}<button onClick={()=>setPrintData(p)} className="text-primary-600">{Icons.print}</button></div></td>
              </tr>
            ))}
            {filtered.length===0 && <tr><td colSpan="8" className="text-center py-8 text-gray-400">لا توجد صرفيات</td></tr>}
          </tbody>
        </table>
        <Pagination total={filtered.length} page={page} setPage={setPage}/>
      </div>
      <Modal isOpen={showModal} onClose={()=>setShowModal(false)} title={editing ? "تعديل وصل صرف أستاذ" : "وصل صرف أستاذ جديد"}>
        <div className="space-y-4">
          <div><label className="block text-sm font-medium mb-1">الأستاذ *</label>
            <SearchableSelect options={teachers.map(t=>({value:t.id, label:t.full_name}))} value={form.teacher_id} onChange={v=>onTeacherSelect(v)} placeholder="ابحث عن الأستاذ..."/>
          </div>
          {form.teacher_id && <div className="bg-blue-50 rounded-lg p-3 text-center">
            <p className="text-sm text-gray-600">رصيد الأستاذ الحالي</p>
            <p className="text-2xl font-bold text-primary-700">{formatMoney(teacherBalance)} د.ع</p>
          </div>}
          <div className="grid grid-cols-2 gap-3">
            <div><label className="block text-sm font-medium mb-1">مبلغ الصرف (د.ع) *</label><input className="input-field" type="number" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})}/></div>
            <div><label className="block text-sm font-medium mb-1">التاريخ</label><input className="input-field" type="date" value={form.payout_date} onChange={e=>setForm({...form,payout_date:e.target.value})}/></div>
          </div>
          <div><label className="block text-sm font-medium mb-1">ملاحظات</label><input className="input-field" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="صرف مستحقات تدريس"/></div>
          <div className="flex gap-3 pt-2"><button className="btn-primary" onClick={handleSave}>{editing ? 'تحديث الوصل' : 'إنشاء الوصل'}</button><button className="btn-ghost" onClick={()=>setShowModal(false)}>إلغاء</button></div>
        </div>
      </Modal>
      <ConfirmDialog isOpen={!!confirmDel} onConfirm={handleDelete} onCancel={()=>setConfirmDel(null)} message="هل أنت متأكد من مسح هذا الوصل؟"/>
      {printData && <ReceiptPrint type="payout" data={printData} onClose={()=>setPrintData(null)}/>}
    </div>
  );
}

// ============================================
// EXPENSES PAGE
// ============================================
function ExpensesPage() {
  const showToast = useContext(ToastContext);
  const { activeYear } = useContext(YearContext);
  const { user } = useContext(AuthContext);
  const hasPerm = (k) => user.role==='admin' || (user.permissions && user.permissions[k]);
  const [expenses, setExpenses] = useState([]);
  const [categories, setCategories] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [filterCat, setFilterCat] = useState('');
  const [showModal, setShowModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const [printData, setPrintData] = useState(null);
  const [page, setPage] = useState(1);
  const [dateFrom, setDateFrom] = useState('');
  const [dateTo, setDateTo] = useState('');
  const [form, setForm] = useState({ category_id:'', amount:'', recipient:'', description:'', expense_date: todayStr() });

  useEffect(() => { loadData(); }, [activeYear]);
  useEffect(() => { setPage(1); }, [search, filterCat, dateFrom, dateTo]);

  const loadData = async () => {
    setLoading(true);
    const [eRes, cRes] = await Promise.all([
      supabase.from('expenses').select('*,expense_categories(name),creator:profiles!created_by(full_name)').eq('academic_year_id', activeYear?.id).eq('is_deleted', false).order('created_at', {ascending:false}),
      supabase.from('expense_categories').select('*').eq('is_active', true).order('sort_order', {ascending:true})
    ]);
    setExpenses(eRes.data || []);
    setCategories(cRes.data || []);
    setLoading(false);
  };

  const handleDelete = async () => {
    const { error } = await supabase.from('expenses').update({ is_deleted: true, deleted_by: user.user_id, deleted_at: new Date().toISOString() }).eq('id', confirmDel);
    if(error) { showToast('خطأ في حذف الوصل', 'error'); return; }
    logAudit(user, 'حذف وصل مصروف', 'expenses', confirmDel);
    showToast('تم مسح الوصل'); setConfirmDel(null); loadData();
  };

  const openEdit = (e) => {
    setEditing(e);
    setForm({ category_id: e.category_id, amount: e.amount+'', recipient: e.recipient||'', description: e.description||'', expense_date: e.expense_date||todayStr() });
    setShowModal(true);
  };

  const openAdd = () => {
    setEditing(null);
    setForm({ category_id:'', amount:'', recipient:'', description:'', expense_date: todayStr() });
    setShowModal(true);
  };

  const handleSave = async () => {
    if(!form.category_id || !form.amount) { showToast('يرجى ملء الحقول المطلوبة', 'error'); return; }
    const expAmt = parseInt(form.amount);
    if(!expAmt || expAmt <= 0 || isNaN(expAmt)) { showToast('يرجى إدخال مبلغ صحيح أكبر من صفر', 'error'); return; }
    if(editing) {
      const { error } = await supabase.from('expenses').update({
        category_id: form.category_id, amount: parseInt(form.amount), recipient: form.recipient,
        description: form.description, expense_date: form.expense_date, updated_by: user.user_id, updated_at: new Date().toISOString()
      }).eq('id', editing.id);
      if(error) { showToast('خطأ في التحديث', 'error'); return; }
      logAudit(user, 'تعديل وصل مصروف', 'expenses', editing.id, formatMoney(parseInt(form.amount))+' د.ع');
      showToast('تم تحديث وصل المصروف بنجاح');
    } else {
      const { data: rcpt } = await supabase.rpc('generate_receipt_number', { p_year_id: activeYear.id, p_type: 'EXP' });
      const voucherNum = Array.isArray(rcpt) ? rcpt[0] : rcpt;
      const { error } = await supabase.from('expenses').insert({
        voucher_number: voucherNum, category_id: form.category_id, academic_year_id: activeYear.id,
        amount: parseInt(form.amount), recipient: form.recipient, description: form.description,
        expense_date: form.expense_date, created_by: user.user_id
      });
      if(error) { showToast('خطأ في الحفظ', 'error'); return; }
      logAudit(user, 'إنشاء وصل مصروف', 'expenses', null, voucherNum+' - '+formatMoney(parseInt(form.amount))+' د.ع');
      showToast('تم إنشاء وصل المصروف بنجاح');
    }
    setShowModal(false); setEditing(null); loadData();
  };

  const filtered = expenses.filter(e => {
    const matchSearch = !search || e.expense_categories?.name?.includes(search) || (e.recipient||'').includes(search) || (e.voucher_number||'').includes(search);
    const matchCat = !filterCat || e.category_id === filterCat;
    const d = e.expense_date; const matchFrom = !dateFrom || d >= dateFrom; const matchTo = !dateTo || d <= dateTo;
    return matchSearch && matchCat && matchFrom && matchTo;
  });

  const handleExport = () => {
    exportToExcel(filtered.map(e => [e.voucher_number, e.expense_categories?.name, e.amount, e.recipient||'', e.description||'', e.expense_date, e.creator?.full_name||'']),
    ['رقم الوصل','الصنف','المبلغ','المستلم','الوصف','التاريخ','بواسطة'], 'المصروفات');
  };

  const totalFiltered = filtered.reduce((s, e) => s + e.amount, 0);

  if(loading) return <Loading/>;

  return (
    <div className="fade-in">
      <PageHeader title="المصروفات" action={hasPerm('expenses.add') ? openAdd : null} actionLabel="وصل مصروف جديد"/>
      <div className="card p-4 mb-4 space-y-3">
        <div className="flex items-center gap-3 flex-wrap">
          <div className="flex-1 min-w-[200px]"><SearchInput value={search} onChange={setSearch}/></div>
          <select className="input-field w-auto" value={filterCat} onChange={e=>setFilterCat(e.target.value)}>
            <option value="">جميع الأصناف</option>{categories.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
          <ExportBtn onClick={handleExport}/>
        </div>
        <DateRangeFilter dateFrom={dateFrom} dateTo={dateTo} setDateFrom={setDateFrom} setDateTo={setDateTo}/>
      </div>
      <div className="card p-3 mb-4 flex justify-between items-center bg-red-50">
        <span className="text-gray-700 font-medium">إجمالي المصروفات المعروضة</span>
        <span className="text-xl font-bold text-red-600">{formatMoney(totalFiltered)} د.ع</span>
      </div>
      <div className="card table-container">
        <table>
          <thead><tr><th>رقم الوصل</th><th>الصنف</th><th>المبلغ</th><th>المستلم</th><th>الوصف</th><th>التاريخ</th><th>بواسطة</th><th>إجراءات</th></tr></thead>
          <tbody>
            {paginate(filtered, page).map(e => (
              <tr key={e.id}>
                <td className="font-mono text-sm">{e.voucher_number}</td>
                <td><span className="badge bg-red-50 text-red-700">{e.expense_categories?.name}</span></td>
                <td className="font-bold text-red-500">{formatMoney(e.amount)} د.ع</td>
                <td>{e.recipient || '-'}</td>
                <td className="text-sm text-gray-500">{e.description || '-'}</td>
                <td>{formatDate(e.expense_date)}</td>
                <td className="text-xs text-gray-500">{e.creator?.full_name || '-'}</td>
                <td><div className="flex gap-2">{hasPerm('expenses.edit') && <button onClick={()=>openEdit(e)} className="text-blue-600">{Icons.edit}</button>}{hasPerm('expenses.delete') && <button onClick={()=>setConfirmDel(e.id)} className="text-red-500">{Icons.trash}</button>}<button onClick={()=>setPrintData(e)} className="text-primary-600">{Icons.print}</button></div></td>
              </tr>
            ))}
            {filtered.length===0 && <tr><td colSpan="8" className="text-center py-8 text-gray-400">لا توجد مصروفات</td></tr>}
          </tbody>
        </table>
        <Pagination total={filtered.length} page={page} setPage={setPage}/>
      </div>
      <Modal isOpen={showModal} onClose={()=>{setShowModal(false);setEditing(null)}} title={editing ? 'تعديل وصل المصروف' : 'وصل مصروف جديد'}>
        <div className="space-y-4">
          {editing && <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-2 text-center text-sm text-yellow-700">تعديل الوصل رقم: <b>{editing.voucher_number}</b></div>}
          <div><label className="block text-sm font-medium mb-1">صنف المصروف *</label>
            <SearchableSelect options={categories.map(c=>({value:c.id, label:c.name}))} value={form.category_id} onChange={v=>setForm({...form,category_id:v})} placeholder="ابحث عن الصنف..."/>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div><label className="block text-sm font-medium mb-1">المبلغ (د.ع) *</label><input className="input-field" type="number" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})}/></div>
            <div><label className="block text-sm font-medium mb-1">التاريخ</label><input className="input-field" type="date" value={form.expense_date} onChange={e=>setForm({...form,expense_date:e.target.value})}/></div>
          </div>
          <div><label className="block text-sm font-medium mb-1">اسم المستلم</label><input className="input-field" value={form.recipient} onChange={e=>setForm({...form,recipient:e.target.value})}/></div>
          <div><label className="block text-sm font-medium mb-1">وصف / ملاحظات</label><input className="input-field" value={form.description} onChange={e=>setForm({...form,description:e.target.value})}/></div>
          <div className="flex gap-3 pt-2"><button className="btn-primary" onClick={handleSave}>{editing ? 'تحديث' : 'إنشاء الوصل'}</button><button className="btn-ghost" onClick={()=>{setShowModal(false);setEditing(null)}}>إلغاء</button></div>
        </div>
      </Modal>
      <ConfirmDialog isOpen={!!confirmDel} onConfirm={handleDelete} onCancel={()=>setConfirmDel(null)} message="هل أنت متأكد من مسح هذا الوصل؟"/>
      {printData && <ReceiptPrint type="expense" data={printData} onClose={()=>setPrintData(null)}/>}
    </div>
  );
}

// ============================================
// REPORTS PAGE
// ============================================
function ReportsPage() {
  const { activeYear } = useContext(YearContext);
  const [activeReport, setActiveReport] = useState('late_payments');
  const [data, setData] = useState([]);
  const [loading, setLoading] = useState(false);
  const [students, setStudents] = useState([]);
  const [teachers, setTeachers] = useState([]);
  const [selectedStudent, setSelectedStudent] = useState('');
  const [selectedTeacher, setSelectedTeacher] = useState('');
  const [dateFrom, setDateFrom] = useState('');
  const [dateTo, setDateTo] = useState('');
  const [studentStmt, setStudentStmt] = useState(null);
  const [teacherStmt, setTeacherStmt] = useState(null);

  useEffect(() => {
    loadLists();
  }, [activeYear]);

  const loadLists = async () => {
    const [sRes, tRes] = await Promise.all([
      supabase.from('students').select('id,full_name').eq('academic_year_id', activeYear?.id).eq('is_active', true),
      supabase.from('teachers').select('id,full_name').eq('is_active', true)
    ]);
    setStudents(sRes.data || []);
    setTeachers(tRes.data || []);
  };

  const loadLatePayments = async () => {
    setLoading(true);
    const { data: regs } = await supabase.from('registrations').select('*,students(full_name,grade_levels(name)),subjects(name_ar),teachers(full_name)')
      .eq('academic_year_id', activeYear?.id).eq('is_active', true).gt('remaining_balance', 0).order('remaining_balance', {ascending:false});
    setData(regs || []);
    setLoading(false);
  };

  const loadStudentStatement = async () => {
    if(!selectedStudent) return;
    setLoading(true);
    const { data: regs } = await supabase.from('registrations').select('*,subjects(name_ar),teachers(full_name)')
      .eq('student_id', selectedStudent).eq('academic_year_id', activeYear?.id).eq('is_active', true);
    const { data: payments } = await supabase.from('payment_allocations').select('*,payments!inner(receipt_number,receipt_date,total_amount,is_deleted)')
      .in('registration_id', (regs||[]).map(r=>r.id)).eq('payments.is_deleted', false);
    const { data: reservs } = await supabase.from('seat_reservations').select('*,seat_reservation_items(*)').eq('student_id', selectedStudent).eq('is_deleted', false);
    const { data: student } = await supabase.from('students').select('*,grade_levels(name)').eq('id', selectedStudent).single();
    setStudentStmt({ student, registrations: regs||[], payments: payments||[], reservations: reservs||[] });
    setLoading(false);
  };

  const loadTeacherStatement = async () => {
    if(!selectedTeacher) return;
    setLoading(true);
    const { data: regs } = await supabase.from('registrations').select('*,students(full_name,grade_levels(name)),subjects(name_ar)')
      .eq('teacher_id', selectedTeacher).eq('academic_year_id', activeYear?.id).eq('is_active', true);
    const { data: payouts } = await supabase.from('teacher_payouts').select('*')
      .eq('teacher_id', selectedTeacher).eq('is_deleted', false).order('created_at', {ascending: true});
    const { data: teacher } = await supabase.from('teachers').select('*').eq('id', selectedTeacher).single();
    const { data: balance } = await supabase.rpc('get_teacher_balance', { p_teacher_id: selectedTeacher, p_year_id: activeYear.id });
    setTeacherStmt({ teacher, registrations: regs||[], payouts: payouts||[], balance: typeof balance === 'number' ? balance : 0 });
    setLoading(false);
  };

  const loadRevenueReport = async () => {
    setLoading(true);
    const [seatRes, payRes] = await Promise.all([
      supabase.from('seat_reservations').select('*,students(full_name)').eq('academic_year_id', activeYear?.id).eq('is_deleted', false)
        .order('receipt_date', {ascending:false}),
      supabase.from('payment_allocations').select('*,payments!inner(receipt_number,receipt_date,is_deleted,students(full_name)),registrations(subjects(name_ar))').eq('payments.is_deleted', false)
    ]);
    setData({ seats: seatRes.data||[], payments: payRes.data||[] });
    setLoading(false);
  };

  const loadExpenseReport = async () => {
    setLoading(true);
    const { data: exps } = await supabase.from('expenses').select('*,expense_categories(name)')
      .eq('academic_year_id', activeYear?.id).eq('is_deleted', false).order('expense_date', {ascending:false});
    setData(exps || []);
    setLoading(false);
  };

  const loadPnl = async () => {
    setLoading(true);
    // Revenue
    const { data: seats } = await supabase.from('seat_reservations').select('amount').eq('academic_year_id', activeYear?.id).eq('is_deleted', false);
    const { data: payAllocs } = await supabase.from('payment_allocations').select('institute_share,payments!inner(academic_year_id,is_deleted)')
      .eq('payments.academic_year_id', activeYear?.id).eq('payments.is_deleted', false);
    // Expenses
    const { data: exps } = await supabase.from('expenses').select('amount,expense_categories(name)')
      .eq('academic_year_id', activeYear?.id).eq('is_deleted', false);

    const totalSeats = (seats||[]).reduce((s,r)=>s+r.amount, 0);
    const totalInstShare = (payAllocs||[]).reduce((s,r)=>s+r.institute_share, 0);
    const totalExpenses = (exps||[]).reduce((s,r)=>s+r.amount, 0);
    // Group expenses by category
    const expByCat = {};
    (exps||[]).forEach(e => {
      const cat = e.expense_categories?.name || 'أخرى';
      expByCat[cat] = (expByCat[cat]||0) + e.amount;
    });
    setData({ totalSeats, totalInstShare, totalRevenue: totalSeats + totalInstShare, totalExpenses, netProfit: totalSeats + totalInstShare - totalExpenses, expByCat });
    setLoading(false);
  };

  useEffect(() => {
    setData([]); setStudentStmt(null); setTeacherStmt(null);
    if(activeReport === 'late_payments') loadLatePayments();
    else if(activeReport === 'revenue') loadRevenueReport();
    else if(activeReport === 'expenses') loadExpenseReport();
    else if(activeReport === 'pnl') loadPnl();
  }, [activeReport, activeYear]);

  const reports = [
    { id: 'late_payments', label: 'المتأخرين عن الدفع' },
    { id: 'student_stmt', label: 'كشف حساب طالب' },
    { id: 'teacher_stmt', label: 'كشف حساب أستاذ' },
    { id: 'revenue', label: 'تقرير الإيرادات' },
    { id: 'expenses', label: 'تقرير المصروفات' },
    { id: 'pnl', label: 'الأرباح والخسائر' },
  ];

  return (
    <div className="fade-in">
      <h2 className="text-2xl font-bold text-gray-800 mb-6">التقارير</h2>
      <div className="flex flex-wrap gap-2 mb-6">
        {reports.map(r => (
          <button key={r.id} onClick={()=>setActiveReport(r.id)}
            className={`px-4 py-2 rounded-lg text-sm font-medium transition ${activeReport===r.id?'bg-primary-600 text-white':'bg-white text-gray-600 hover:bg-gray-100'}`}>
            {r.label}
          </button>
        ))}
      </div>

      {loading && <Loading/>}

      {/* Late Payments */}
      {activeReport === 'late_payments' && !loading && Array.isArray(data) && (
        <div className="card table-container">
          <table>
            <thead><tr><th>الطالب</th><th>المرحلة</th><th>المادة</th><th>الأستاذ</th><th>القسط الكلي</th><th>المدفوع</th><th>المتبقي</th></tr></thead>
            <tbody>
              {data.map(r => (
                <tr key={r.id}>
                  <td className="font-medium">{r.students?.full_name}</td>
                  <td>{r.students?.grade_levels?.name}</td>
                  <td>{r.subjects?.name_ar}</td>
                  <td>{r.teachers?.full_name}</td>
                  <td>{formatMoney(r.total_tuition)}</td>
                  <td className="text-green-600">{formatMoney(r.total_paid)}</td>
                  <td className="font-bold text-red-500">{formatMoney(r.remaining_balance)} د.ع</td>
                </tr>
              ))}
              {data.length===0 && <tr><td colSpan="7" className="text-center py-8 text-gray-400">لا يوجد متأخرين</td></tr>}
            </tbody>
          </table>
        </div>
      )}

      {/* Student Statement */}
      {activeReport === 'student_stmt' && !loading && (
        <div>
          <div className="card p-4 mb-4 flex flex-wrap gap-3 items-end">
            <div className="flex-1 min-w-[200px]">
              <label className="block text-sm font-medium mb-1">اختر الطالب</label>
              <SearchableSelect options={students.map(s=>({value:s.id, label:s.full_name}))} value={selectedStudent} onChange={v=>setSelectedStudent(v)} placeholder="ابحث عن الطالب..."/>
            </div>
            <button className="btn-primary" onClick={loadStudentStatement}>عرض الكشف</button>
            {studentStmt && <button className="btn-ghost flex items-center gap-1" onClick={()=>window.print()}>{Icons.print} طباعة</button>}
          </div>
          {studentStmt && (
            <div className="card p-6 print-receipt">
              <div className="text-center mb-6 border-b pb-4">

// SETTINGS PAGE
// ============================================
function SettingsPage() {
  const showToast = useContext(ToastContext);
  const { activeYear, years, setYears, setActiveYear } = useContext(YearContext);
  const [tab, setTab] = useState('years');
  const [subjects, setSubjects] = useState([]);
  const [grades, setGrades] = useState([]);
  const [categories, setCategories] = useState([]);
  const [settings, setSettings] = useState(null);
  const [loading, setLoading] = useState(true);
  const [showModal, setShowModal] = useState(false);
  const [modalType, setModalType] = useState('');
  const [form, setForm] = useState({});

  useEffect(() => { loadAll(); }, []);

  const loadAll = async () => {
    setLoading(true);
    const [subRes, grRes, catRes, setRes] = await Promise.all([
      supabase.from('subjects').select('*').eq('is_active', true).order('sort_order', {ascending:true}),
      supabase.from('grade_levels').select('*').eq('is_active', true).order('sort_order', {ascending:true}),
      supabase.from('expense_categories').select('*').eq('is_active', true).order('sort_order', {ascending:true}),
      supabase.from('institute_settings').select('*').limit(1)
    ]);
    setSubjects(subRes.data||[]);
    setGrades(grRes.data||[]);
    setCategories(catRes.data||[]);
    setSettings(Array.isArray(setRes.data) ? setRes.data[0] || null : setRes.data);
    setLoading(false);
  };

  const openAdd = (type) => {
    setModalType(type);
    if(type==='year') setForm({ name:'', start_date:'', end_date:'' });
    else if(type==='subject') setForm({ name_ar:'', name_en:'' });
    else if(type==='grade') setForm({ name:'' });
    else if(type==='category') setForm({ name:'' });
    setShowModal(true);
  };

  const handleSave = async () => {
    if(modalType==='year') {
      if(!form.name) { showToast('يرجى إدخال اسم السنة', 'error'); return; }
      const { data } = await supabase.from('academic_years').insert(form).select().single();
      if(data) { const newYears = [...years, data]; setYears(newYears); }
      showToast('تم إضافة السنة الدراسية');
    } else if(modalType==='subject') {
      const { error } = await supabase.from('subjects').insert({ name_ar: form.name_ar, name_en: form.name_en, sort_order: subjects.length+1 });
      if(error) { showToast('خطأ في إضافة المادة', 'error'); return; }
      showToast('تم إضافة المادة');
    } else if(modalType==='grade') {
      const { error } = await supabase.from('grade_levels').insert({ name: form.name, sort_order: grades.length+1 });
      if(error) { showToast('خطأ في إضافة المرحلة', 'error'); return; }
      showToast('تم إضافة المرحلة');
    } else if(modalType==='category') {
      const { error } = await supabase.from('expense_categories').insert({ name: form.name, sort_order: categories.length+1 });
      if(error) { showToast('خطأ في إضافة الصنف', 'error'); return; }
      showToast('تم إضافة الصنف');
    }
    setShowModal(false); loadAll();
  };

  const setActiveYearFn = async (yearId) => {
    // Deactivate current active year first, then activate the new one
    const currentActive = years.find(y => y.is_active);
    if(currentActive) await supabase.from('academic_years').update({ is_active: false }).eq('id', currentActive.id);
    await supabase.from('academic_years').update({ is_active: true }).eq('id', yearId);
    const { data: updatedYears } = await supabase.from('academic_years').select('*').order('name', {ascending:false});
    setYears(updatedYears||[]);
    const active = (updatedYears||[]).find(y=>y.is_active);
    if(active) setActiveYear(active);
    showToast('تم تعيين السنة الدراسية الفعالة');
  };

  const saveSettings = async () => {
    if(!settings) return;
    await supabase.from('institute_settings').update({
      name_ar: settings.name_ar, name_en: settings.name_en, address: settings.address, phone: settings.phone
    }).eq('id', settings.id);
    showToast('تم حفظ إعدادات المعهد');
  };

  if(loading) return <Loading/>;

  const tabs = [
    { id:'years', label:'السنوات الدراسية' },
    { id:'subjects', label:'المواد' },
    { id:'grades', label:'المراحل' },
    { id:'categories', label:'أصناف المصروفات' },
    { id:'institute', label:'معلومات المعهد' },
  ];

  return (
    <div className="fade-in">
      <h2 className="text-2xl font-bold text-gray-800 mb-6">الإعدادات</h2>
      <div className="flex flex-wrap gap-2 mb-6">
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            className={`px-4 py-2 rounded-lg text-sm font-medium transition ${tab===t.id?'bg-primary-600 text-white':'bg-white text-gray-600 hover:bg-gray-100'}`}>
            {t.label}
          </button>
        ))}
      </div>

      {tab === 'years' && (
        <div className="card p-4">
          <div className="flex justify-between items-center mb-4">
            <h3 className="font-bold">السنوات الدراسية</h3>
            <button className="btn-primary flex items-center gap-1" onClick={()=>openAdd('year')}>{Icons.plus} إضافة سنة</button>
          </div>
          {years.map(y => (
            <div key={y.id} className={`flex justify-between items-center p-3 rounded-lg mb-2 ${y.is_active?'bg-green-50 border border-green-200':'bg-gray-50'}`}>
              <div><span className="font-bold">{y.name}</span>{y.is_active && <span className="badge bg-green-100 text-green-700 mr-2">فعالة</span>}</div>
              {!y.is_active && <button className="btn-ghost text-sm" onClick={()=>setActiveYearFn(y.id)}>تعيين كفعالة</button>}
            </div>
          ))}
        </div>
      )}

      {tab === 'subjects' && (
        <div className="card p-4">
          <div className="flex justify-between items-center mb-4">
            <h3 className="font-bold">المواد الدراسية</h3>
            <button className="btn-primary flex items-center gap-1" onClick={()=>openAdd('subject')}>{Icons.plus} إضافة مادة</button>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2">
            {subjects.map(s => (
              <div key={s.id} className="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                <span>{s.name_ar}</span><span className="text-sm text-gray-400">{s.name_en}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {tab === 'grades' && (
        <div className="card p-4">
          <div className="flex justify-between items-center mb-4">
            <h3 className="font-bold">المراحل الدراسية</h3>
            <button className="btn-primary flex items-center gap-1" onClick={()=>openAdd('grade')}>{Icons.plus} إضافة مرحلة</button>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2">
            {grades.map(g => <div key={g.id} className="p-3 bg-gray-50 rounded-lg">{g.name}</div>)}
          </div>
        </div>
      )}

      {tab === 'categories' && (
        <div className="card p-4">
          <div className="flex justify-between items-center mb-4">
            <h3 className="font-bold">أصناف المصروفات</h3>
            <button className="btn-primary flex items-center gap-1" onClick={()=>openAdd('category')}>{Icons.plus} إضافة صنف</button>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
            {categories.map(c => <div key={c.id} className="p-3 bg-gray-50 rounded-lg">{c.name}</div>)}
          </div>
        </div>
      )}

      {tab === 'institute' && settings && (
        <div className="card p-6">
          <h3 className="font-bold mb-4">معلومات المعهد</h3>
          <div className="space-y-4 max-w-lg">
            <div><label className="block text-sm font-medium mb-1">الاسم بالعربية</label><input className="input-field" value={settings.name_ar||''} onChange={e=>setSettings({...settings,name_ar:e.target.value})}/></div>
            <div><label className="block text-sm font-medium mb-1">الاسم بالإنجليزية</label><input className="input-field" value={settings.name_en||''} onChange={e=>setSettings({...settings,name_en:e.target.value})}/></div>
            <div><label className="block text-sm font-medium mb-1">العنوان</label><input className="input-field" value={settings.address||''} onChange={e=>setSettings({...settings,address:e.target.value})}/></div>
            <div><label className="block text-sm font-medium mb-1">رقم الهاتف</label><input className="input-field" value={settings.phone||''} onChange={e=>setSettings({...settings,phone:e.target.value})}/></div>
            <button className="btn-primary" onClick={saveSettings}>حفظ التغييرات</button>
          </div>
        </div>
      )}

      <Modal isOpen={showModal} onClose={()=>setShowModal(false)} title={modalType==='year'?'إضافة سنة دراسية':modalType==='subject'?'إضافة مادة':modalType==='grade'?'إضافة مرحلة':'إضافة صنف'}>
        <div className="space-y-4">
          {modalType==='year' && <>
            <div><label className="block text-sm font-medium mb-1">اسم السنة (مثل: 2025-2026)</label><input className="input-field" value={form.name||''} onChange={e=>setForm({...form,name:e.target.value})}/></div>
            <div className="grid grid-cols-2 gap-3">
              <div><label className="block text-sm font-medium mb-1">تاريخ البداية</label><input className="input-field" type="date" value={form.start_date||''} onChange={e=>setForm({...form,start_date:e.target.value})}/></div>
              <div><label className="block text-sm font-medium mb-1">تاريخ النهاية</label><input className="input-field" type="date" value={form.end_date||''} onChange={e=>setForm({...form,end_date:e.target.value})}/></div>
            </div>
          </>}
          {modalType==='subject' && <>
            <div><label className="block text-sm font-medium mb-1">اسم المادة بالعربية *</label><input className="input-field" value={form.name_ar||''} onChange={e=>setForm({...form,name_ar:e.target.value})}/></div>
            <div><label className="block text-sm font-medium mb-1">اسم المادة بالإنجليزية</label><input className="input-field" value={form.name_en||''} onChange={e=>setForm({...form,name_en:e.target.value})}/></div>
          </>}
          {modalType==='grade' && <div><label className="block text-sm font-medium mb-1">اسم المرحلة *</label><input className="input-field" value={form.name||''} onChange={e=>setForm({...form,name:e.target.value})}/></div>}
          {modalType==='category' && <div><label className="block text-sm font-medium mb-1">اسم الصنف *</label><input className="input-field" value={form.name||''} onChange={e=>setForm({...form,name:e.target.value})}/></div>}
          <div className="flex gap-3"><button className="btn-primary" onClick={handleSave}>إضافة</button><button className="btn-ghost" onClick={()=>setShowModal(false)}>إلغاء</button></div>
        </div>
      </Modal>
    </div>
  );
}

  const [editing, setEditing] = useState(null);

  };

  const openAdd = () => {
    setEditing(null);
    setForm({ username:'', password:'', full_name:'', role:'employee' });
    setShowModal(true);
  };

  const openEdit = (u) => {
    setEditing(u);
    setForm({ username: u.username, password: '', full_name: u.full_name, role: u.role });
    setShowModal(true);
  };

  const handleDelete = async () => {
    const { error } = await supabase.from('profiles').update({ is_active: false }).eq('id', confirmDel);
    if(error) { showToast('خطأ في تعطيل المستخدم', 'error'); return; }
    logAudit(user, 'تعطيل مستخدم', 'profiles', confirmDel);
    showToast('تم تعطيل المستخدم'); setConfirmDel(null); loadUsers();
  };

  const handleSave = async () => {
    if(!form.username?.trim() || !form.full_name?.trim()) { showToast('يرجى ملء الحقول المطلوبة', 'error'); return; }
    if(form.username.trim().length < 3) { showToast('اسم المستخدم يجب أن يكون 3 أحرف على الأقل', 'error'); return; }
    if(!/^[a-zA-Z0-9_]+$/.test(form.username.trim())) { showToast('اسم المستخدم يجب أن يحتوي على أحرف إنجليزية وأرقام فقط', 'error'); return; }
    if(!editing && !form.password) { showToast('يرجى إدخال كلمة المرور', 'error'); return; }
    if(form.password && form.password.length < 4) { showToast('كلمة المرور يجب أن تكون 4 أحرف على الأقل', 'error'); return; }

    if(editing) {
      const updates = { username: form.username, full_name: form.full_name, role: form.role };
      if(form.password) {
        const { data: hash } = await supabase.rpc('hash_password', { p_password: form.password });
        updates.password_hash = Array.isArray(hash) ? hash[0] : hash;
      }
      const { error } = await supabase.from('profiles').update(updates).eq('id', editing.id);
      if(error) { showToast('خطأ في التحديث: ' + (error.message||''), 'error'); return; }
      showToast('تم تحديث بيانات المستخدم');
    } else {
      const { data: hash, error: hashErr } = await supabase.rpc('hash_password', { p_password: form.password });
      if(hashErr || !hash) { showToast('خطأ في تشفير كلمة المرور', 'error'); return; }
      const hashVal = Array.isArray(hash) ? hash[0] : hash;
      const { error } = await supabase.from('profiles').insert({
        username: form.username, password_hash: hashVal, full_name: form.full_name, role: form.role
      });
      if(error) { showToast('خطأ: ربما اسم المستخدم موجود مسبقاً', 'error'); return; }
      showToast('تم إنشاء المستخدم بنجاح');
    }
    setShowModal(false); setEditing(null); loadUsers();
  };

  const openPerms = async (u) => {
    setSelectedUser(u);
    const { data } = await supabase.rpc('get_user_permissions', { p_user_id: u.id });
    const map = {};
    if(data) data.forEach(p => map[p.permission_key] = p.granted);
    setUserPerms(map);
    setShowPermsModal(true);
  };

  const togglePerm = (key) => {
    setUserPerms(p => ({...p, [key]: !p[key]}));
  };

  const savePerms = async () => {
    // Delete existing permissions
    await supabase.from('permissions').delete().eq('user_id', selectedUser.id);
    // Insert new ones
    const perms = Object.entries(userPerms).filter(([k,v])=>v).map(([k,v])=>({
      user_id: selectedUser.id, permission_key: k, granted: true
    }));
    if(perms.length) await supabase.from('permissions').insert(perms);
    showToast('تم حفظ الصلاحيات');
    setShowPermsModal(false);
  };

  if(loading) return <Loading/>;

  return (
    <div className="fade-in">
      <PageHeader title="إدارة المستخدمين" action={openAdd} actionLabel="إضافة مستخدم"/>
      <div className="card table-container">
        <table>
          <thead><tr><th>#</th><th>اسم المستخدم</th><th>الاسم الكامل</th><th>الدور</th><th>إجراءات</th></tr></thead>
          <tbody>
            {users.map((u,i) => (
              <tr key={u.id}>
                <td>{i+1}</td>
                <td className="font-mono">{u.username}</td>
                <td>{u.full_name}</td>
                <td><span className={`badge ${u.role==='admin'?'bg-primary-100 text-primary-700':'bg-gray-100 text-gray-700'}`}>{u.role==='admin'?'مدير النظام':'موظف'}</span></td>
                <td><div className="flex gap-2">
                  <button onClick={()=>openEdit(u)} className="text-blue-600" title="تعديل البيانات">{Icons.edit}</button>
                  {u.role==='employee' && <button className="btn-ghost text-xs py-1 px-2" onClick={()=>openPerms(u)}>الصلاحيات</button>}
                  {u.role!=='admin' && <button onClick={()=>setConfirmDel(u.id)} className="text-red-500" title="تعطيل">{Icons.trash}</button>}
                </div></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <Modal isOpen={showModal} onClose={()=>{setShowModal(false);setEditing(null)}} title={editing ? 'تعديل بيانات المستخدم' : 'إضافة مستخدم جديد'}>
        <div className="space-y-4">
          {editing && <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-2 text-center text-sm text-yellow-700">تعديل المستخدم: <b>{editing.username}</b></div>}
          <div><label className="block text-sm font-medium mb-1">اسم المستخدم *</label><input className="input-field" value={form.username} onChange={e=>setForm({...form,username:e.target.value})}/></div>
          <div><label className="block text-sm font-medium mb-1">{editing ? 'كلمة المرور الجديدة (اتركها فارغة لعدم التغيير)' : 'كلمة المرور *'}</label><input className="input-field" type="password" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} placeholder={editing ? 'اتركها فارغة إذا لا تريد تغييرها' : ''}/></div>
          <div><label className="block text-sm font-medium mb-1">الاسم الكامل *</label><input className="input-field" value={form.full_name} onChange={e=>setForm({...form,full_name:e.target.value})}/></div>
          <div><label className="block text-sm font-medium mb-1">الدور</label>
            <select className="input-field" value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
              <option value="employee">موظف</option><option value="admin">مدير النظام</option>
            </select>
          </div>
          <div className="flex gap-3"><button className="btn-primary" onClick={handleSave}>{editing ? 'تحديث' : 'إنشاء'}</button><button className="btn-ghost" onClick={()=>{setShowModal(false);setEditing(null)}}>إلغاء</button></div>
        </div>
      </Modal>
      <ConfirmDialog isOpen={!!confirmDel} onConfirm={handleDelete} onCancel={()=>setConfirmDel(null)} message="هل أنت متأكد من تعطيل هذا المستخدم؟"/>
      <Modal isOpen={showPermsModal} onClose={()=>setShowPermsModal(false)} title={`صلاحيات: ${selectedUser?.full_name}`} wide>
        <div className="space-y-4">
          {ALL_PERMISSIONS.map(group => (
            <div key={group.group} className="border rounded-lg p-3">
              <h4 className="font-bold text-gray-700 mb-2">{group.group}</h4>
              <div className="flex flex-wrap gap-3">
                {group.keys.map(key => (
                  <label key={key} className="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" checked={!!userPerms[key]} onChange={()=>togglePerm(key)} className="w-4 h-4 rounded"/>
                    <span className="text-sm">{PERM_LABELS[key]}</span>
                  </label>
                ))}
              </div>
            </div>
          ))}
          <div className="flex gap-3"><button className="btn-primary" onClick={savePerms}>حفظ الصلاحيات</button><button className="btn-ghost" onClick={()=>setShowPermsModal(false)}>إلغاء</button></div>
        </div>
      </Modal>
    </div>
  );
}

// ============================================
// TRASH PAGE (المحذوفات)
// ============================================
function TrashPage() {
  const showToast = useContext(ToastContext);
  const { activeYear } = useContext(YearContext);
  const { user } = useContext(AuthContext);
  const [activeTab, setActiveTab] = useState('reservations');
  const [loading, setLoading] = useState(true);
  const [data, setData] = useState([]);
  const [confirmRestore, setConfirmRestore] = useState(null);
  const [page, setPage] = useState(1);

  const tabs = [
    { id: 'reservations', label: 'وصولات الحجز', color: '#1B3A5C' },
    { id: 'payments', label: 'وصولات القبض', color: '#2D8B4E' },
    { id: 'payouts', label: 'وصولات الصرف', color: '#e74c3c' },
    { id: 'expenses', label: 'المصروفات', color: '#e67e22' },
    { id: 'students', label: 'الطلاب', color: '#6c757d' },
  ];

  useEffect(() => { loadData(); }, [activeTab, activeYear]);
  useEffect(() => { setPage(1); }, [activeTab]);

  const loadData = async () => {
    if(!activeYear?.id) return;
    setLoading(true);
    try {
      let res;
      switch(activeTab) {
        case 'reservations':
          res = await supabase.from('seat_reservations').select('*,students(full_name),seat_reservation_items(*),creator:profiles!created_by(full_name),deleter:profiles!deleted_by(full_name)').eq('academic_year_id', activeYear.id).eq('is_deleted', true).order('deleted_at', {ascending:false});
          break;
        case 'payments':
          res = await supabase.from('payments').select('*,students(full_name),creator:profiles!created_by(full_name),deleter:profiles!deleted_by(full_name)').eq('academic_year_id', activeYear.id).eq('is_deleted', true).order('deleted_at', {ascending:false});
          break;
        case 'payouts':
          res = await supabase.from('teacher_payouts').select('*,teachers(full_name),creator:profiles!created_by(full_name),deleter:profiles!deleted_by(full_name)').eq('academic_year_id', activeYear.id).eq('is_deleted', true).order('deleted_at', {ascending:false});
          break;
        case 'expenses':
          res = await supabase.from('expenses').select('*,expense_categories(name),creator:profiles!created_by(full_name),deleter:profiles!deleted_by(full_name)').eq('academic_year_id', activeYear.id).eq('is_deleted', true).order('deleted_at', {ascending:false});
          break;
        case 'students':
          res = await supabase.from('students').select('*,grade_levels(name),deleter:profiles!deleted_by(full_name)').eq('academic_year_id', activeYear.id).eq('is_active', false).order('deleted_at', {ascending:false});
          break;
      }
      setData(res?.data || []);
    } catch(e) { console.error(e); }
    setLoading(false);
  };

  const handleRestore = async () => {
    if(!confirmRestore) return;
    const item = confirmRestore;
    let result;
    switch(activeTab) {
      case 'reservations':
        result = await supabase.rpc('restore_reservation', { p_reservation_id: item.id });
        break;
      case 'payments':
        result = await supabase.rpc('restore_payment', { p_payment_id: item.id });
        break;
      case 'payouts':
        result = await supabase.rpc('restore_payout', { p_payout_id: item.id });
        break;
      case 'expenses':
        result = await supabase.rpc('restore_expense', { p_expense_id: item.id });
        break;
      case 'students':
        result = await supabase.rpc('restore_student', { p_student_id: item.id });
        break;
    }
    if(result?.error) { showToast('خطأ في الاسترجاع: ' + (result.error.message||''), 'error'); setConfirmRestore(null); return; }
    logAudit(user, 'استرجاع عنصر', activeTab, item.id);
    showToast('تم استرجاع العنصر بنجاح');
    setConfirmRestore(null);
    loadData();
  };

  const getSubjectsText = (r) => {
    const items = r.seat_reservation_items || [];
    return items.length > 0 ? items.map(i => i.subject_name || '-').join('، ') : '-';
  };

  const formatDateTime = (dt) => {
    if(!dt) return '-';
    try { return new Date(dt).toLocaleString('ar-IQ', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }); } catch(e) { return dt; }
  };

  if(loading) return <Loading/>;

  return (
    <div className="fade-in">
      <PageHeader title="المحذوفات"/>
      <div className="flex flex-wrap gap-2 mb-4">
        {tabs.map(t => (
          <button key={t.id} onClick={()=>setActiveTab(t.id)}
            className="px-4 py-2 rounded-lg text-sm font-medium transition-all"

// ============================================
// PASSWORD CHANGE MODAL
// ============================================
function ChangePasswordModal({ isOpen, onClose }) {
  const showToast = useContext(ToastContext);
  const { user } = useContext(AuthContext);
  const [form, setForm] = useState({ oldPass: '', newPass: '', confirmPass: '' });
  const [loading, setLoading] = useState(false);

  const handleSubmit = async () => {
    if(!form.oldPass || !form.newPass || !form.confirmPass) { showToast('يرجى ملء جميع الحقول', 'error'); return; }
    if(form.newPass.length < 6) { showToast('كلمة المرور الجديدة يجب أن تكون 6 أحرف على الأقل', 'error'); return; }
    if(form.newPass !== form.confirmPass) { showToast('كلمة المرور الجديدة غير متطابقة', 'error'); return; }
    setLoading(true);
    const { data } = await supabase.rpc('change_password', { p_user_id: user.user_id, p_old_password: form.oldPass, p_new_password: form.newPass });
    setLoading(false);
    const result = Array.isArray(data) ? data[0] : data;
    if(result === 'WRONG_PASSWORD') { showToast('كلمة المرور الحالية غير صحيحة', 'error'); return; }
    if(result === 'SUCCESS') { showToast('تم تغيير كلمة المرور بنجاح'); setForm({ oldPass:'', newPass:'', confirmPass:'' }); onClose(); return; }
    showToast('حدث خطأ غير متوقع', 'error');
  };

  if(!isOpen) return null;
  return (
    <Modal isOpen={isOpen} onClose={onClose} title="تغيير كلمة المرور">
      <div className="space-y-4">
        <div><label className="block text-sm font-medium mb-1">كلمة المرور الحالية</label><input className="input-field" type="password" value={form.oldPass} onChange={e=>setForm({...form, oldPass:e.target.value})}/></div>
        <div><label className="block text-sm font-medium mb-1">كلمة المرور الجديدة</label><input className="input-field" type="password" value={form.newPass} onChange={e=>setForm({...form, newPass:e.target.value})}/></div>
        <div><label className="block text-sm font-medium mb-1">تأكيد كلمة المرور الجديدة</label><input className="input-field" type="password" value={form.confirmPass} onChange={e=>setForm({...form, confirmPass:e.target.value})}/></div>
        <button className="btn-primary w-full" onClick={handleSubmit} disabled={loading}>{loading ? 'جاري التغيير...' : 'تغيير كلمة المرور'}</button>
      </div>
    </Modal>
  );
}

// ============================================
// MONTHLY FINANCIAL CHART REPORT
// ============================================
function MonthlyChartReport() {
  const { activeYear, years } = useContext(YearContext);
  const [monthlyData, setMonthlyData] = useState([]);
  const [teacherPerf, setTeacherPerf] = useState([]);
  const [compareData, setCompareData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [activeTab, setActiveTab] = useState('monthly');
  const [compareYear, setCompareYear] = useState('');

  useEffect(() => { if(activeTab === 'monthly') loadMonthly(); else if(activeTab === 'teachers') loadTeacherPerf(); }, [activeTab, activeYear]);

  const loadMonthly = async () => {
    setLoading(true);
    // Get all revenue + expenses for the year, grouped by month
    const [seatRes, payRes, expRes] = await Promise.all([
      supabase.from('seat_reservations').select('amount,receipt_date').eq('academic_year_id', activeYear?.id).eq('is_deleted', false),
      supabase.from('payment_allocations').select('institute_share,payments!inner(receipt_date,academic_year_id,is_deleted)').eq('payments.academic_year_id', activeYear?.id).eq('payments.is_deleted', false),
      supabase.from('expenses').select('amount,expense_date').eq('academic_year_id', activeYear?.id).eq('is_deleted', false)
    ]);
    const months = {};
    const monthNames = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
    (seatRes.data||[]).forEach(r => { const m = r.receipt_date?.substring(0,7); if(m) { if(!months[m]) months[m]={revenue:0,expenses:0}; months[m].revenue += r.amount; }});
    (payRes.data||[]).forEach(r => { const m = r.payments?.receipt_date?.substring(0,7); if(m) { if(!months[m]) months[m]={revenue:0,expenses:0}; months[m].revenue += r.institute_share; }});
    (expRes.data||[]).forEach(r => { const m = r.expense_date?.substring(0,7); if(m) { if(!months[m]) months[m]={revenue:0,expenses:0}; months[m].expenses += r.amount; }});
    const sorted = Object.entries(months).sort((a,b)=>a[0].localeCompare(b[0])).map(([month, vals]) => {
      const [y,m] = month.split('-');
      const mi = parseInt(m) - 1;
      const label = (mi >= 0 && mi < 12 ? monthNames[mi] : m) + ' ' + y;
      return { month, label, ...vals, profit: vals.revenue - vals.expenses };
    });
    setMonthlyData(sorted);
    setLoading(false);
  };

  const loadTeacherPerf = async () => {
    setLoading(true);
    const { data: teachers } = await supabase.from('teachers').select('id,full_name').eq('is_active', true);
    const { data: regs } = await supabase.from('registrations').select('teacher_id,total_tuition,total_paid,teacher_share,remaining_balance').eq('academic_year_id', activeYear?.id).eq('is_active', true);
    const { data: payouts } = await supabase.from('teacher_payouts').select('teacher_id,amount').eq('academic_year_id', activeYear?.id).eq('is_deleted', false);
    const perfMap = {};
    (teachers||[]).forEach(t => { perfMap[t.id] = { name: t.full_name, students: 0, totalTuition: 0, totalPaid: 0, teacherShare: 0, remaining: 0, paidOut: 0 }; });
    (regs||[]).forEach(r => { if(perfMap[r.teacher_id]) { perfMap[r.teacher_id].students++; perfMap[r.teacher_id].totalTuition += r.total_tuition; perfMap[r.teacher_id].totalPaid += r.total_paid; perfMap[r.teacher_id].teacherShare += r.teacher_share; perfMap[r.teacher_id].remaining += r.remaining_balance; }});
    (payouts||[]).forEach(p => { if(perfMap[p.teacher_id]) perfMap[p.teacher_id].paidOut += p.amount; });
    setTeacherPerf(Object.values(perfMap).filter(t=>t.students>0).sort((a,b)=>b.students-a.students));
    setLoading(false);
  };

  const loadCompare = async () => {
    if(!compareYear) return;
    setLoading(true);
    const loadYearData = async (yearId) => {
      const [seatRes, payRes, expRes] = await Promise.all([
        supabase.from('seat_reservations').select('amount').eq('academic_year_id', yearId).eq('is_deleted', false),
        supabase.from('payment_allocations').select('institute_share,payments!inner(academic_year_id,is_deleted)').eq('payments.academic_year_id', yearId).eq('payments.is_deleted', false),
        supabase.from('expenses').select('amount').eq('academic_year_id', yearId).eq('is_deleted', false)
      ]);
      const seats = (seatRes.data||[]).reduce((s,r)=>s+r.amount, 0);
      const instShare = (payRes.data||[]).reduce((s,r)=>s+r.institute_share, 0);
      const expenses = (expRes.data||[]).reduce((s,r)=>s+r.amount, 0);
      const { data: studCount } = await supabase.from('students').select('id').eq('academic_year_id', yearId).eq('is_active', true);
      return { revenue: seats + instShare, seats, instShare, expenses, profit: seats + instShare - expenses, students: (studCount||[]).length };
    };
    const [current, compare] = await Promise.all([loadYearData(activeYear.id), loadYearData(compareYear)]);
    const cYear = years.find(y=>y.id===compareYear);
    setCompareData({ current: { ...current, name: activeYear.name }, compare: { ...compare, name: cYear?.name || '' } });
    setLoading(false);
  };

  const maxVal = Math.max(...monthlyData.map(m => Math.max(m.revenue, m.expenses)), 1);

  return (
    <div className="fade-in">
      <h2 className="text-2xl font-bold text-gray-800 mb-6">التقارير المتقدمة</h2>
      <div className="flex flex-wrap gap-2 mb-6">
        {[{id:'monthly',label:'التقرير الشهري'},{id:'teachers',label:'أداء الأساتذة'},{id:'compare',label:'مقارنة السنوات'}].map(t=>
          <button key={t.id} onClick={()=>setActiveTab(t.id)} className={`px-4 py-2 rounded-lg text-sm font-medium transition ${activeTab===t.id?'bg-primary-600 text-white':'bg-white text-gray-600 hover:bg-gray-100'}`}>{t.label}</button>
        )}
      </div>

      {loading && <Loading/>}

      {/* Monthly Chart */}
      {activeTab === 'monthly' && !loading && (
        <div>
          <div className="card p-6 mb-4">
            <h3 className="font-bold text-gray-700 mb-4">الإيرادات والمصروفات الشهرية - {activeYear?.name}</h3>
            {monthlyData.length === 0 ? <p className="text-center py-8 text-gray-400">لا توجد بيانات</p> : (
              <div className="flex items-end gap-2 overflow-x-auto pb-4" style={{height: 280}}>
                {monthlyData.map((m, i) => (
                  <div key={i} className="flex flex-col items-center flex-shrink-0" style={{width: Math.max(60, (100/monthlyData.length))+'%'}}>
                    <div className="flex gap-1 items-end" style={{height: 200}}>
                      <div className="chart-bar bg-green-500" style={{width:20, height: Math.max(4, (m.revenue/maxVal)*200)}} title={`إيرادات: ${formatMoney(m.revenue)}`}></div>
                      <div className="chart-bar bg-red-400" style={{width:20, height: Math.max(4, (m.expenses/maxVal)*200)}} title={`مصروفات: ${formatMoney(m.expenses)}`}></div>
                    </div>
                    <p className="text-xs text-gray-500 mt-2 text-center whitespace-nowrap">{m.label}</p>
                    <p className={`text-xs font-bold ${m.profit>=0?'text-green-600':'text-red-500'}`}>{formatMoney(m.profit)}</p>
                  </div>
                ))}
              </div>
            )}
            <div className="flex gap-6 justify-center mt-2">
              <span className="flex items-center gap-1 text-sm"><span className="w-3 h-3 rounded bg-green-500 inline-block"></span> إيرادات</span>
              <span className="flex items-center gap-1 text-sm"><span className="w-3 h-3 rounded bg-red-400 inline-block"></span> مصروفات</span>
            </div>
          </div>
          {monthlyData.length > 0 && (
            <div className="card table-container">
              <table>
                <thead><tr><th>الشهر</th><th>الإيرادات</th><th>المصروفات</th><th>صافي الربح</th></tr></thead>
                <tbody>
                  {monthlyData.map((m,i)=><tr key={i}><td>{m.label}</td><td className="text-green-600 font-bold">{formatMoney(m.revenue)} د.ع</td><td className="text-red-500 font-bold">{formatMoney(m.expenses)} د.ع</td><td className={`font-bold ${m.profit>=0?'text-blue-600':'text-orange-500'}`}>{formatMoney(m.profit)} د.ع</td></tr>)}
                  <tr className="font-bold bg-gray-50"><td>الإجمالي</td><td className="text-green-600">{formatMoney(monthlyData.reduce((s,m)=>s+m.revenue,0))} د.ع</td><td className="text-red-500">{formatMoney(monthlyData.reduce((s,m)=>s+m.expenses,0))} د.ع</td><td className={monthlyData.reduce((s,m)=>s+m.profit,0)>=0?'text-blue-600':'text-orange-500'}>{formatMoney(monthlyData.reduce((s,m)=>s+m.profit,0))} د.ع</td></tr>
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}

      {/* Teacher Performance */}
      {activeTab === 'teachers' && !loading && (
        <div className="card table-container">
          <table>
            <thead><tr><th>الأستاذ</th><th>عدد الطلاب</th><th>إجمالي الأقساط</th><th>المحصّل</th><th>المتبقي</th><th>حصة الأستاذ</th><th>المصروف</th><th>المستحق</th></tr></thead>
            <tbody>
              {teacherPerf.map((t,i) => (
                <tr key={i}>
                  <td className="font-medium">{t.name}</td>
                  <td className="text-center">{t.students}</td>
                  <td>{formatMoney(t.totalTuition)} د.ع</td>
                  <td className="text-green-600">{formatMoney(t.totalPaid)} د.ع</td>
                  <td className="text-red-500">{formatMoney(t.remaining)} د.ع</td>
                  <td>{formatMoney(t.teacherShare)} د.ع</td>
                  <td>{formatMoney(t.paidOut)} د.ع</td>
                  <td className="font-bold text-primary-700">{formatMoney(t.teacherShare - t.paidOut)} د.ع</td>
                </tr>
              ))}
              {teacherPerf.length===0 && <tr><td colSpan="8" className="text-center py-8 text-gray-400">لا توجد بيانات</td></tr>}
            </tbody>
          </table>
        </div>
      )}

      {/* Year Comparison */}
      {activeTab === 'compare' && !loading && (
        <div>
          <div className="card p-4 mb-4 flex flex-wrap gap-3 items-end">
            <div>
              <label className="block text-sm font-medium mb-1">مقارنة مع سنة</label>
              <select className="input-field w-auto" value={compareYear} onChange={e=>setCompareYear(e.target.value)}>
                <option value="">اختر سنة</option>
                {years.filter(y=>y.id!==activeYear?.id).map(y=><option key={y.id} value={y.id}>{y.name}</option>)}
              </select>
            </div>
            <button className="btn-primary" onClick={loadCompare}>مقارنة</button>
          </div>
          {compareData && (
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              {[compareData.current, compareData.compare].map((d, i) => (
                <div key={i} className={`card p-6 ${i===0?'border-2 border-primary-200':''}`}>
                  <h3 className="text-lg font-bold text-center mb-4">{d.name}</h3>
                  <div className="space-y-3">
                    <div className="flex justify-between"><span>عدد الطلاب:</span><b>{d.students}</b></div>
                    <div className="flex justify-between"><span>إيرادات الحجوزات:</span><b className="text-green-600">{formatMoney(d.seats)} د.ع</b></div>
                    <div className="flex justify-between"><span>حصة المعهد من الأقساط:</span><b className="text-green-600">{formatMoney(d.instShare)} د.ع</b></div>
                    <div className="flex justify-between border-t pt-2"><span>إجمالي الإيرادات:</span><b className="text-green-700">{formatMoney(d.revenue)} د.ع</b></div>
                    <div className="flex justify-between"><span>إجمالي المصروفات:</span><b className="text-red-500">{formatMoney(d.expenses)} د.ع</b></div>
                    <div className={`flex justify-between border-t pt-2 text-lg ${d.profit>=0?'':'text-orange-600'}`}><span>صافي الربح:</span><b className={d.profit>=0?'text-blue-600':'text-orange-600'}>{formatMoney(d.profit)} د.ع</b></div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ============================================
// NOTIFICATIONS PANEL
// ============================================
function NotificationsPanel({ onClose }) {
  const { activeYear } = useContext(YearContext);
  const [notifications, setNotifications] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => { loadNotifications(); }, []);

  const loadNotifications = async () => {
    setLoading(true);
    const notifs = [];

    // 1. Students with high remaining balance
    const { data: lateRegs } = await supabase.from('registrations').select('remaining_balance,students(full_name)').eq('academic_year_id', activeYear?.id).eq('is_active', true).gt('remaining_balance', 50000).order('remaining_balance', {ascending:false}).limit(10);
    (lateRegs||[]).forEach(r => notifs.push({ type: 'warning', msg: `${r.students?.full_name} - رصيد متأخر: ${formatMoney(r.remaining_balance)} د.ع` }));

    // 2. Teachers with high unpaid balance
    const { data: teachers } = await supabase.from('teachers').select('id,full_name').eq('is_active', true);
    for(const t of (teachers||[]).slice(0, 20)) {
      const { data: bal } = await supabase.rpc('get_teacher_balance', { p_teacher_id: t.id, p_year_id: activeYear?.id });
      const balance = typeof bal === 'number' ? bal : (Array.isArray(bal) ? bal[0] : 0);
      if(balance > 100000) notifs.push({ type: 'info', msg: `أ. ${t.full_name} - مستحقات غير مصروفة: ${formatMoney(balance)} د.ع` });
    }

    setNotifications(notifs);
    setLoading(false);
  };

  return (
    <div className="fixed inset-0 z-50" onClick={onClose}>
      <div className="card absolute left-4 top-16 w-96 max-w-[90vw] rounded-xl shadow-2xl border max-h-[70vh] overflow-y-auto" onClick={e=>e.stopPropagation()}>
        <div className="p-4 border-b flex justify-between items-center">
          <h3 className="font-bold text-gray-800">التنبيهات</h3>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600">{Icons.close}</button>
        </div>
        {loading ? <div className="p-8"><Loading/></div> : (
          <div className="divide-y">
            {notifications.length === 0 && <p className="p-6 text-center text-gray-400">لا توجد تنبيهات</p>}
            {notifications.map((n, i) => (
              <div key={i} className={`p-3 flex gap-3 items-start ${n.type==='warning'?'bg-orange-50':'bg-blue-50'}`}>
                <span className={`mt-1 ${n.type==='warning'?'text-orange-500':'text-blue-500'}`}>{Icons.bell}</span>
                <p className="text-sm">{n.msg}</p>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ============================================
// BACKUP UTILITY
// ============================================
function BackupButton({ activeYear }) {
  const showToast = useContext(ToastContext);
  return <button onClick={()=>backupAllData(activeYear, showToast)} className="p-2 rounded-lg hover:bg-gray-100 text-gray-500" title="نسخة احتياطية">{Icons.backup}</button>;
}

async function backupAllData(activeYear, showToast) {
  showToast('جاري تحضير النسخة الاحتياطية...');
  try {
    const [studRes, teachRes, regRes, seatRes, payRes, allocRes, payoutRes, expRes, catRes] = await Promise.all([
      supabase.from('students').select('*,grade_levels(name)').eq('academic_year_id', activeYear?.id),
      supabase.from('teachers').select('*'),
      supabase.from('registrations').select('*,subjects(name_ar),teachers(full_name),students(full_name)').eq('academic_year_id', activeYear?.id).eq('is_active', true),
      supabase.from('seat_reservations').select('*,students(full_name)').eq('academic_year_id', activeYear?.id).eq('is_deleted', false),
      supabase.from('payments').select('*,students(full_name)').eq('academic_year_id', activeYear?.id).eq('is_deleted', false),
      supabase.from('payment_allocations').select('*,registrations(subjects(name_ar),students(full_name)),payments!inner(receipt_number,academic_year_id,is_deleted)').eq('payments.academic_year_id', activeYear?.id).eq('payments.is_deleted', false),
      supabase.from('teacher_payouts').select('*,teachers(full_name)').eq('academic_year_id', activeYear?.id).eq('is_deleted', false),
      supabase.from('expenses').select('*,expense_categories(name)').eq('academic_year_id', activeYear?.id).eq('is_deleted', false),
      supabase.from('expense_categories').select('*')
    ]);
    const wb = XLSX.utils.book_new();
    // Students
    const studData = (studRes.data||[]).map(s=>[s.full_name, s.grade_levels?.name, s.student_phone, s.parent_phone, s.notes]);
    const ws1 = XLSX.utils.aoa_to_sheet([['الاسم','المرحلة','هاتف الطالب','هاتف الولي','ملاحظات'],...studData]);
    XLSX.utils.book_append_sheet(wb, ws1, 'الطلاب');
    // Teachers
    const teachData = (teachRes.data||[]).map(t=>[t.full_name, t.phone, t.commission_type==='percentage'?'نسبة':'ثابت', t.commission_value]);
    const ws2 = XLSX.utils.aoa_to_sheet([['الاسم','الهاتف','نوع العمولة','القيمة'],...teachData]);
    XLSX.utils.book_append_sheet(wb, ws2, 'الأساتذة');
    // Registrations
    const regData = (regRes.data||[]).map(r=>[r.students?.full_name, r.subjects?.name_ar, r.teachers?.full_name, r.total_tuition, r.total_paid, r.remaining_balance]);
    const ws3 = XLSX.utils.aoa_to_sheet([['الطالب','المادة','الأستاذ','القسط','المدفوع','المتبقي'],...regData]);
    XLSX.utils.book_append_sheet(wb, ws3, 'التسجيلات');
    // Seat Reservations
    const seatData = (seatRes.data||[]).map(r=>[r.receipt_number, r.students?.full_name, r.amount, r.receipt_date, r.notes]);
    const ws4 = XLSX.utils.aoa_to_sheet([['رقم الوصل','الطالب','المبلغ','التاريخ','ملاحظات'],...seatData]);
    XLSX.utils.book_append_sheet(wb, ws4, 'حجوزات المقاعد');
    // Payments
    const payData = (payRes.data||[]).map(p=>[p.receipt_number, p.students?.full_name, p.total_amount, p.allocation_type==='equal'?'متساوي':'يدوي', p.receipt_date]);
    const ws5 = XLSX.utils.aoa_to_sheet([['رقم الوصل','الطالب','المبلغ','التوزيع','التاريخ'],...payData]);
    XLSX.utils.book_append_sheet(wb, ws5, 'الدفعات');
    // Payouts
    const payoutData = (payoutRes.data||[]).map(p=>[p.voucher_number, p.teachers?.full_name, p.amount, p.balance_before, p.balance_after, p.payout_date]);
    const ws6 = XLSX.utils.aoa_to_sheet([['رقم الوصل','الأستاذ','المبلغ','الرصيد قبل','الرصيد بعد','التاريخ'],...payoutData]);
    XLSX.utils.book_append_sheet(wb, ws6, 'صرف الأساتذة');
    // Expenses
    const expData = (expRes.data||[]).map(e=>[e.voucher_number, e.expense_categories?.name, e.amount, e.recipient, e.description, e.expense_date]);
    const ws7 = XLSX.utils.aoa_to_sheet([['رقم الوصل','الصنف','المبلغ','المستلم','الوصف','التاريخ'],...expData]);
    XLSX.utils.book_append_sheet(wb, ws7, 'المصروفات');

    XLSX.writeFile(wb, `نسخة_احتياطية_${activeYear?.name || 'كايزن'}_${todayStr()}.xlsx`);
    showToast('تم تحميل النسخة الاحتياطية بنجاح');
  } catch(e) {
    showToast('خطأ في تحضير النسخة الاحتياطية: ' + e.message, 'error');
  }
}

// ============================================
// MAIN APP
// ============================================
function App() {
  const [user, setUser] = useState(null);
  const [activePage, setActivePage] = useState('dashboard');
  const [years, setYears] = useState([]);
  const [activeYear, setActiveYear] = useState(null);
  const [loadingApp, setLoadingApp] = useState(false);
  const [darkMode, setDarkMode] = useState(() => localStorage.getItem('kaizen_dark') === 'true');
  const [showPassModal, setShowPassModal] = useState(false);
  const [showNotifs, setShowNotifs] = useState(false);

  // Apply dark mode class
  useEffect(() => {
    document.documentElement.classList.toggle('dark', darkMode);
    localStorage.setItem('kaizen_dark', String(darkMode));
  }, [darkMode]);

  const SESSION_TIMEOUT = 8 * 60 * 60 * 1000; // 8 hours

  useEffect(() => {
    // Check stored session
    try {
      const stored = localStorage.getItem('kaizen_user');
      if(stored) {
        const parsed = JSON.parse(stored);
        const lastActivity = localStorage.getItem('kaizen_last_activity');
        if(parsed && parsed.user_id && parsed.role) {
          if(lastActivity && (Date.now() - parseInt(lastActivity)) > SESSION_TIMEOUT) {
            localStorage.removeItem('kaizen_user');
            localStorage.removeItem('kaizen_last_activity');
          } else {
            setUser(parsed);
            localStorage.setItem('kaizen_last_activity', String(Date.now()));
          }
        } else {
          localStorage.removeItem('kaizen_user');
        }
      }
    } catch(e) {
      localStorage.removeItem('kaizen_user');
      localStorage.removeItem('kaizen_last_activity');
    }
  }, []);

  // Track activity to refresh session
  useEffect(() => {
    if(!user) return;
    const updateActivity = () => localStorage.setItem('kaizen_last_activity', String(Date.now()));
    const events = ['click', 'keydown', 'scroll'];
    events.forEach(e => window.addEventListener(e, updateActivity, { passive: true }));
    // Check timeout every 5 minutes
    const interval = setInterval(() => {
      const last = parseInt(localStorage.getItem('kaizen_last_activity') || '0');
      if(Date.now() - last > SESSION_TIMEOUT) { handleLogout(); }
    }, 5 * 60 * 1000);
    return () => { events.forEach(e => window.removeEventListener(e, updateActivity)); clearInterval(interval); };
  }, [user]);

  useEffect(() => {
    if(user) loadYears();
  }, [user]);

  const loadYears = async () => {
    setLoadingApp(true);
    const { data } = await supabase.from('academic_years').select('*').order('name', {ascending:false});
    setYears(data || []);
    const active = (data||[]).find(y => y.is_active);
    setActiveYear(active || (data||[])[0] || null);
    setLoadingApp(false);
  };

  const handleLogin = (u) => {
    setUser(u);
    localStorage.setItem('kaizen_user', JSON.stringify(u));
    localStorage.setItem('kaizen_last_activity', String(Date.now()));
  };

  const handleLogout = () => {
    if(user) supabase.rpc('log_login', { p_user_id: user.user_id, p_full_name: user.full_name, p_action: 'logout' });
    setUser(null);
    localStorage.removeItem('kaizen_user');
    localStorage.removeItem('kaizen_last_activity');
    setActivePage('dashboard');
  };

  if(!user) return (
    <ToastProvider>
      <LoginPage onLogin={handleLogin}/>
    </ToastProvider>
  );

  if(loadingApp) return <div className="min-h-screen flex items-center justify-center"><Loading/></div>;

  const renderPage = () => {
    switch(activePage) {
      case 'dashboard': return <DashboardPage/>;
      case 'students': return <StudentsPage/>;
      case 'teachers': return <TeachersPage/>;
      case 'reservations': return <ReservationsPage/>;
      case 'payments': return <PaymentsPage/>;
      case 'payouts': return <PayoutsPage/>;
      case 'expenses': return <ExpensesPage/>;
      case 'reports': return <ReportsPage/>;
      case 'advreports': return <MonthlyChartReport/>;
      case 'settings': return <SettingsPage/>;
      case 'usermgmt': return <UserMgmtPage/>;
      case 'trash': return <TrashPage/>;
      case 'loginlog': return <LoginLogPage/>;
      case 'auditlog': return <AuditLogPage/>;
      case 'more': return <MoreMenu setActivePage={setActivePage}/>;
      default: return <DashboardPage/>;
    }
  };

  return (
    <ToastProvider>
      <AuthContext.Provider value={{ user }}>
        <YearContext.Provider value={{ activeYear, years, setYears, setActiveYear }}>
          <Sidebar activePage={activePage} setActivePage={setActivePage} user={user} onLogout={handleLogout}/>
          <div className="main-content mr-0 md:mr-64 p-4 md:p-6 min-h-screen">
            {/* Year selector bar */}
            <div className="flex justify-between items-center mb-4 no-print flex-wrap gap-2">
              <div className="flex items-center gap-2">
                <span className="text-sm text-gray-500">السنة الدراسية:</span>
                <select className="input-field w-auto text-sm py-1" value={activeYear?.id||''} onChange={e=>{
                  const y = years.find(y=>y.id===e.target.value);
                  if(y) setActiveYear(y);
                }}>
                  {years.map(y=><option key={y.id} value={y.id}>{y.name} {y.is_active?'(فعالة)':''}</option>)}
                </select>
              </div>
              <div className="flex items-center gap-2">
                <button onClick={()=>setShowNotifs(!showNotifs)} className="p-2 rounded-lg hover:bg-gray-100 text-gray-500 relative" title="التنبيهات">{Icons.bell}</button>
                <BackupButton activeYear={activeYear}/>
                <button onClick={()=>setDarkMode(!darkMode)} className="p-2 rounded-lg hover:bg-gray-100 text-gray-500" title="الوضع الليلي">{darkMode ? Icons.sun : Icons.moon}</button>
                <button onClick={()=>setShowPassModal(true)} className="p-2 rounded-lg hover:bg-gray-100 text-gray-500" title="تغيير كلمة المرور">{Icons.lock}</button>
                <span className="text-sm text-gray-500">{user.full_name}</span>
              </div>
            </div>
            {showNotifs && <NotificationsPanel onClose={()=>setShowNotifs(false)}/>}
            <ChangePasswordModal isOpen={showPassModal} onClose={()=>setShowPassModal(false)}/>
            {renderPage()}
          </div>
        </YearContext.Provider>
      </AuthContext.Provider>
    </ToastProvider>
  );
}

// Error Boundary
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', {style:{padding:40,textAlign:'center',fontFamily:'Cairo'}},
        React.createElement('h2', {style:{color:'#e74c3c',marginBottom:16}}, 'حدث خطأ في النظام'),
        React.createElement('p', {style:{color:'#666',marginBottom:16}}, String(this.state.error?.message || this.state.error)),
        React.createElement('button', {onClick:()=>{localStorage.removeItem('kaizen_user');location.reload()},style:{background:'#1B3A5C',color:'white',padding:'10px 24px',borderRadius:8,border:'none',cursor:'pointer',fontSize:16}}, 'إعادة تحميل')
      );
    }
    return this.props.children;
  }
}

ReactDOM.render(React.createElement(ErrorBoundary, null, React.createElement(App)), document.getElementById('root'));
</script>
