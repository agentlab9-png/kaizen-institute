// Simple Supabase client
const supabase = {
  from: (table) => ({
    select: (cols = '*') => ({ _table: table, _select: cols, _filters: [], _order: null, _limit: null,
      eq: function(col,val) { this._filters.push(`${col}=eq.${val}`); return this; },
      neq: function(col,val) { this._filters.push(`${col}=neq.${val}`); return this; },
      is: function(col,val) { this._filters.push(`${col}=is.${val}`); return this; },
      gt: function(col,val) { this._filters.push(`${col}=gt.${val}`); return this; },
      gte: function(col,val) { this._filters.push(`${col}=gte.${val}`); return this; },
      lte: function(col,val) { this._filters.push(`${col}=lte.${val}`); return this; },
      ilike: function(col,val) { this._filters.push(`${col}=ilike.${val}`); return this; },
      in: function(col,vals) { this._filters.push(`${col}=in.(${vals.join(',')})`); return this; },
      order: function(col, opts={}) { this._order = `${col}.${opts.ascending?'asc':'desc'}`; return this; },
      limit: function(n) { this._limit = n; return this; },
      single: function() { this._single = true; return this; },
      then: async function(resolve, reject) {
        try {
          let url = `${SUPABASE_URL}/rest/v1/${this._table}?select=${encodeURIComponent(this._select)}`;
          this._filters.forEach(f => url += `&${f}`);
          if(this._order) url += `&order=${this._order}`;
          if(this._limit) url += `&limit=${this._limit}`;
          const headers = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' };
          if(this._single) headers['Accept'] = 'application/vnd.pgrst.object+json';
          const res = await fetch(url, { headers });
          if(!res.ok) { const e = await res.json(); return resolve({ data: null, error: e }); }
          const data = await res.json();
          resolve({ data, error: null });
        } catch(e) { resolve({ data: null, error: e }); }
      }
    }),
    insert: (data) => ({
      _table: table, _data: data,
      select: function(cols) { this._returning = cols; return this; },
      single: function() { this._single = true; return this; },
      then: async function(resolve) {
        try {
          let url = `${SUPABASE_URL}/rest/v1/${this._table}`;
          if(this._returning) url += `?select=${encodeURIComponent(this._returning)}`;
          const headers = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };
          if(this._single) headers['Accept'] = 'application/vnd.pgrst.object+json';
          const res = await fetch(url, { method:'POST', headers, body: JSON.stringify(Array.isArray(this._data)?this._data:[this._data]) });
          if(!res.ok) { const e = await res.json(); return resolve({ data: null, error: e }); }
          const d = await res.json();
          resolve({ data: d, error: null });
        } catch(e) { resolve({ data: null, error: e }); }
      }
    }),
    update: (data) => ({
      _table: table, _data: data, _filters: [],
      eq: function(col,val) { this._filters.push(`${col}=eq.${val}`); return this; },
      neq: function(col,val) { this._filters.push(`${col}=neq.${val}`); return this; },
      in: function(col,vals) { this._filters.push(`${col}=in.(${vals.join(',')})`); return this; },
      select: function() { this._returning = true; return this; },
      single: function() { this._single = true; return this; },
      then: async function(resolve) {
        try {
          let url = `${SUPABASE_URL}/rest/v1/${this._table}?`;
          url += this._filters.join('&');
          const headers = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };
          if(this._single) headers['Accept'] = 'application/vnd.pgrst.object+json';
          const res = await fetch(url, { method:'PATCH', headers, body: JSON.stringify(this._data) });
          if(!res.ok) { const e = await res.json(); return resolve({ data: null, error: e }); }
          const d = await res.json();
          resolve({ data: d, error: null });
        } catch(e) { resolve({ data: null, error: e }); }
      }
    }),
    delete: () => ({
      _table: table, _filters: [],
      eq: function(col,val) { this._filters.push(`${col}=eq.${val}`); return this; },
      then: async function(resolve) {
        try {
          let url = `${SUPABASE_URL}/rest/v1/${this._table}?`;
          url += this._filters.join('&');
          const headers = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Prefer': 'return=representation' };
          const res = await fetch(url, { method:'DELETE', headers });
          if(!res.ok) { const e = await res.json(); return resolve({ data: null, error: e }); }
          const d = await res.json();
          resolve({ data: d, error: null });
        } catch(e) { resolve({ data: null, error: e }); }
      }
    }),
    upsert: (data) => ({
      _table: table, _data: data,
      select: function() { this._returning = true; return this; },
      single: function() { this._single = true; return this; },
      then: async function(resolve) {
        try {
          const url = `${SUPABASE_URL}/rest/v1/${this._table}`;
          const headers = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation,resolution=merge-duplicates' };
          if(this._single) headers['Accept'] = 'application/vnd.pgrst.object+json';
          const res = await fetch(url, { method:'POST', headers, body: JSON.stringify(Array.isArray(this._data)?this._data:[this._data]) });
          if(!res.ok) { const e = await res.json(); return resolve({ data: null, error: e }); }
          const d = await res.json();
          resolve({ data: d, error: null });
        } catch(e) { resolve({ data: null, error: e }); }
      }
    })
  }),
  rpc: (fn, params={}) => ({
    then: async function(resolve) {
      try {
        const url = `${SUPABASE_URL}/rest/v1/rpc/${fn}`;
        const headers = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' };
        const res = await fetch(url, { method:'POST', headers, body: JSON.stringify(params) });
        if(!res.ok) { const e = await res.json(); return resolve({ data: null, error: e }); }
        const d = await res.json();
        resolve({ data: d, error: null });
      } catch(e) { resolve({ data: null, error: e }); }
    }
  })
};

// ============================================
// SEARCHABLE SELECT (type-to-search dropdown)
// ============================================
function SearchableSelect({ options, value, onChange, placeholder, className }) {
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState('');
  const ref = useRef();
  const inputRef = useRef();

  useEffect(() => {
    const handler = (e) => { if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const selected = options.find(o => o.value === value);
  const filtered = options.filter(o => o.label.toLowerCase().includes(query.toLowerCase()));

  return (
    <div ref={ref} className="relative" style={{position:'relative'}}>
      <div className={className || "input-field"} style={{cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'space-between', minHeight:42}}
        onClick={() => { setOpen(!open); setQuery(''); setTimeout(()=>inputRef.current?.focus(), 50); }}>
        <span style={{color: selected ? '#111' : '#999'}}>{selected ? selected.label : (placeholder || 'اختر...')}</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#999" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      {open && (
        <div style={{position:'absolute', top:'100%', right:0, left:0, background:'white', border:'1px solid #ddd', borderRadius:8, boxShadow:'0 4px 12px rgba(0,0,0,0.15)', zIndex:999, maxHeight:250, overflow:'hidden', display:'flex', flexDirection:'column'}}>
          <div style={{padding:8, borderBottom:'1px solid #eee'}}>
            <input ref={inputRef} className="input-field" type="text" value={query} onChange={e=>setQuery(e.target.value)}
              placeholder="ابحث..." style={{margin:0, width:'100%', fontSize:13}} onClick={e=>e.stopPropagation()}/>
          </div>
          <div style={{overflowY:'auto', maxHeight:200}}>
            <div style={{padding:'8px 12px', cursor:'pointer', fontSize:13, color:'#999'}}
              onClick={()=>{onChange('');setOpen(false);setQuery('');}}>-- بدون اختيار --</div>
            {filtered.map(o => (
              <div key={o.value} style={{padding:'8px 12px', cursor:'pointer', fontSize:13, background: o.value===value ? '#EEF2FF' : 'white'}}
                onMouseEnter={e=>e.target.style.background='#f3f4f6'}
                onMouseLeave={e=>e.target.style.background=o.value===value?'#EEF2FF':'white'}
                onClick={()=>{onChange(o.value);setOpen(false);setQuery('');}}>
                {o.label}
              </div>
            ))}
            {filtered.length === 0 && <div style={{padding:'12px', textAlign:'center', color:'#999', fontSize:13}}>لا توجد نتائج</div>}
          </div>
        </div>
      )}
    </div>
  );
}

function ToastProvider({ children }) {
  const [toast, setToast] = useState(null);
  const showToast = useCallback((msg, type='success') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  }, []);
  return (
    <ToastContext.Provider value={showToast}>
      {children}
      {toast && <div className="toast" style={{ background: toast.type==='success'?'#2D8B4E':'#dc2626' }}>{toast.msg}</div>}
    </ToastContext.Provider>
  );
}

function LoginPage({ onLogin }) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleLogin = async (e) => {
    e.preventDefault();
    setError('');
    setLoading(true);
    const { data, error: err } = await supabase.rpc('login', { p_username: username, p_password: password });
    setLoading(false);
    if(err) { setError('اسم المستخدم أو كلمة المرور غير صحيحة'); return; }
    const user = Array.isArray(data) ? data[0] : data;
    if(!user) { setError('اسم المستخدم أو كلمة المرور غير صحيحة'); return; }
    // Get permissions
    const { data: perms } = await supabase.rpc('get_user_permissions', { p_user_id: user.user_id });
    const permMap = {};
    if(perms) perms.forEach(p => permMap[p.permission_key] = p.granted);
    // Log login
    supabase.rpc('log_login', { p_user_id: user.user_id, p_full_name: user.full_name, p_action: 'login' });
    onLogin({ ...user, permissions: permMap });
  };

  return (
    <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-primary-600 to-primary-900 p-4">
      <div className="card p-8 w-full max-w-md">
        <div className="text-center mb-8">
          <div className="flex justify-center mb-4">
            <KaizenLogo size={80}/>
          </div>
          <h1 className="text-2xl font-bold text-primary-700">معهد كايزن</h1>
          <p className="text-gray-500 text-sm">Kaizen Institute</p>
          <p className="text-gray-400 text-xs mt-1">نظام الإدارة والمحاسبة</p>
        </div>
        <form onSubmit={handleLogin}>
          <div className="mb-4">
            <label className="block text-sm font-medium text-gray-700 mb-1">اسم المستخدم</label>
            <input className="input-field" value={username} onChange={e=>setUsername(e.target.value)} placeholder="أدخل اسم المستخدم" required />
          </div>
          <div className="mb-4">
            <label className="block text-sm font-medium text-gray-700 mb-1">كلمة المرور</label>
            <input className="input-field" type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="أدخل كلمة المرور" required />
          </div>
          {error && <p className="text-red-500 text-sm mb-4">{error}</p>}
          <button className="btn-primary w-full py-3 text-lg" disabled={loading}>{loading ? 'جاري الدخول...' : 'تسجيل الدخول'}</button>
        </form>
      </div>
    </div>
  );
}

// ============================================
// DASHBOARD PAGE
// ============================================
function DashboardPage() {
  const { activeYear } = useContext(YearContext);
  const [stats, setStats] = useState(null);
  const [chartData, setChartData] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if(!activeYear) return;
    loadData();
  }, [activeYear]);

  const [noSeatStudents, setNoSeatStudents] = useState([]);
  const [seatDetail, setSeatDetail] = useState(null);

  const loadData = async () => {
    if(!activeYear?.id) return;
    setLoading(true);
    try {
      const { data: s } = await supabase.rpc('get_dashboard_stats', { p_year_id: activeYear.id });
      setStats(s);
      const { data: c } = await supabase.rpc('get_monthly_chart_data', { p_year_id: activeYear.id });
      setChartData(c || []);
      // Check students registered but without full seat reservation coverage
      const { data: allStudents } = await supabase.from('students').select('id,full_name').eq('academic_year_id', activeYear.id).eq('is_active', true);
      const { data: allRegs } = await supabase.from('registrations').select('id,student_id,subject_id,subjects(name_ar),teachers(full_name)').eq('academic_year_id', activeYear.id).eq('is_active', true);
      const { data: allSeatRes } = await supabase.from('seat_reservations').select('id,student_id,seat_reservation_items(subject_name,amount)').eq('academic_year_id', activeYear.id).eq('is_deleted', false);
      // Build per-student seat paid subject set
      const seatPaidMap = {};
      (allSeatRes||[]).forEach(sr => {
        if(!seatPaidMap[sr.student_id]) seatPaidMap[sr.student_id] = new Set();
        (sr.seat_reservation_items||[]).forEach(item => { if(item.subject_name) seatPaidMap[sr.student_id].add(item.subject_name); });
      });
      // Build result
      const result = [];
      (allStudents||[]).forEach(stu => {
        const regs = (allRegs||[]).filter(r => r.student_id === stu.id);
        if(regs.length === 0) return;
        const paidSet = seatPaidMap[stu.id] || new Set();
        const subjects = regs.map(r => ({
          name: r.subjects?.name_ar || '-',
          teacher: r.teachers?.full_name || '-',
          paid: paidSet.has(r.subjects?.name_ar)
        }));
        const unpaid = subjects.filter(s => !s.paid);
        if(unpaid.length > 0) {
          result.push({ ...stu, subjects, unpaidCount: unpaid.length, totalCount: subjects.length });
        }
      });
      setNoSeatStudents(result);
    } catch(e) { console.error('Dashboard error:', e); }
    setLoading(false);
  };

  if(!activeYear) return <div className="text-center py-10 text-gray-500">جاري تحميل السنة الدراسية...</div>;
  if(loading) return <Loading/>;

  const statCards = [
    { label: 'عدد الطلاب', value: stats?.total_students || 0, color: '#1B3A5C', icon: Icons.students },
    { label: 'عدد الأساتذة', value: stats?.total_teachers || 0, color: '#2D8B4E', icon: Icons.teachers },
    { label: 'إيرادات الشهر', value: formatMoney(stats?.month_revenue || 0) + ' د.ع', color: '#2D8B4E', icon: Icons.money },
    { label: 'مصروفات الشهر', value: formatMoney(stats?.month_expenses || 0) + ' د.ع', color: '#e74c3c', icon: Icons.expense },
    { label: 'صافي الربح', value: formatMoney(stats?.net_profit || 0) + ' د.ع', color: (stats?.net_profit||0) >= 0 ? '#2D8B4E' : '#e74c3c', icon: Icons.reports },
    { label: 'الأرصدة المعلقة', value: formatMoney(stats?.total_outstanding || 0) + ' د.ع', color: '#e67e22', icon: Icons.receipt },
  ];

  const maxVal = Math.max(...chartData.map(d => Math.max(d.revenue||0, d.expenses||0)), 1);

  return (
    <div className="fade-in">
      <h2 className="text-2xl font-bold text-gray-800 mb-6">لوحة التحكم - {activeYear?.name}</h2>
      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-8">
        {statCards.map((s, i) => (
          <div key={i} className="stat-card" style={{'--accent': s.color}}>
            <div className="absolute top-0 right-0 w-1 h-full" style={{background: s.color}}></div>
            <div className="flex justify-between items-start">
              <div>
                <p className="text-gray-500 text-sm mb-1">{s.label}</p>
                <p className="text-2xl font-bold" style={{color: s.color}}>{s.value}</p>
              </div>
              <div className="p-2 rounded-lg" style={{background: s.color+'15', color: s.color}}>{s.icon}</div>
            </div>
          </div>
        ))}
      </div>
      {noSeatStudents.length > 0 && (
        <div className="card p-4 mb-6 border-r-4" style={{borderRightColor:'#e67e22', background:'#FFF8F0'}}>
          <div className="flex items-center gap-2 mb-3">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#e67e22" strokeWidth="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            <h3 className="font-bold text-orange-700">تنبيه: طلاب لديهم مواد بدون حجز مقعد ({noSeatStudents.length})</h3>
          </div>
          <p className="text-sm text-orange-600 mb-3">اضغط على اسم الطالب لعرض كشف تفصيلي بالمواد المدفوعة وغير المدفوعة:</p>
          <div className="flex flex-wrap gap-2">
            {noSeatStudents.map(s => (
              <button key={s.id} onClick={()=>setSeatDetail(s)} className="px-3 py-1.5 rounded-full text-sm font-medium cursor-pointer hover:shadow-md transition-all" style={{background:'#FDEBD0', color:'#9C5700', border:'1px solid #F0C36D'}}>
                {s.full_name} <span className="text-xs" style={{color:'#c0392b'}}>({s.unpaidCount} من {s.totalCount})</span>
              </button>
            ))}
          </div>
        </div>
      )}
      {/* Seat Detail Modal */}
      {seatDetail && (
        <div className="modal-overlay" onClick={()=>setSeatDetail(null)}>
          <div className="modal-content max-w-lg" onClick={e=>e.stopPropagation()}>
            <div className="flex justify-between items-center mb-4">
              <h3 className="font-bold text-lg">كشف حجز المقعد - {seatDetail.full_name}</h3>
              <button onClick={()=>setSeatDetail(null)} className="text-gray-400 hover:text-gray-600">{Icons.close}</button>
            </div>
            <div className="mb-3 p-3 rounded-lg" style={{background:'#FFF8F0', border:'1px solid #F0C36D'}}>
              <div className="flex justify-between text-sm">
                <span>إجمالي المواد المسجلة: <b>{seatDetail.totalCount}</b></span>
                <span>مدفوع الحجز: <b className="text-green-600">{seatDetail.totalCount - seatDetail.unpaidCount}</b></span>
                <span>غير مدفوع: <b className="text-red-600">{seatDetail.unpaidCount}</b></span>
              </div>
            </div>
            <table className="w-full text-sm">
              <thead><tr style={{background:'#f5f5f5'}}><th className="p-2 text-right">المادة</th><th className="p-2 text-right">الأستاذ</th><th className="p-2 text-center">حالة الحجز</th></tr></thead>
              <tbody>
                {seatDetail.subjects.map((sub, i) => (
                  <tr key={i} style={{background: sub.paid ? '#f0fdf4' : '#fef2f2', borderBottom:'1px solid #eee'}}>
                    <td className="p-2 font-medium">{sub.name}</td>
                    <td className="p-2 text-gray-600">{sub.teacher}</td>
                    <td className="p-2 text-center">
                      {sub.paid
                        ? <span className="px-3 py-1 rounded-full text-xs font-bold" style={{background:'#dcfce7', color:'#166534'}}>مدفوع ✓</span>
                        : <span className="px-3 py-1 rounded-full text-xs font-bold" style={{background:'#fee2e2', color:'#991b1b'}}>غير مدفوع ✗</span>
                      }
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
      {/* Charts - CSS Based */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div className="card p-5">
          <h3 className="font-bold text-gray-700 mb-4">الإيرادات مقابل المصروفات (شهري)</h3>
          <div className="flex items-end gap-1 h-48 border-b border-gray-200 pb-2">
            {chartData.map((d, i) => (
              <div key={i} className="flex-1 flex flex-col items-center gap-1" title={`${d.month_name}\nإيرادات: ${formatMoney(d.revenue)} د.ع\nمصروفات: ${formatMoney(d.expenses)} د.ع`}>
                <div className="w-full flex gap-px justify-center items-end" style={{height:'100%'}}>
                  <div className="rounded-t" style={{width:'45%', height: `${Math.max((d.revenue||0)/maxVal*100, 2)}%`, background:'#2D8B4E', minHeight:2}}></div>
                  <div className="rounded-t" style={{width:'45%', height: `${Math.max((d.expenses||0)/maxVal*100, 2)}%`, background:'#e74c3c', minHeight:2}}></div>
                </div>
              </div>
            ))}
          </div>
          <div className="flex justify-center gap-1 mt-1">
            {chartData.map((d,i) => <div key={i} className="flex-1 text-center text-xs text-gray-400" style={{fontSize:9}}>{d.month_name?.substring(0,3)}</div>)}
          </div>
          <div className="flex justify-center gap-6 mt-3 text-sm">
            <span className="flex items-center gap-1"><span className="w-3 h-3 rounded" style={{background:'#2D8B4E'}}></span> الإيرادات</span>
            <span className="flex items-center gap-1"><span className="w-3 h-3 rounded" style={{background:'#e74c3c'}}></span> المصروفات</span>
          </div>
        </div>
        <div className="card p-5">
          <h3 className="font-bold text-gray-700 mb-4">صافي الربح الشهري</h3>
          <div className="space-y-2">
            {chartData.map((d, i) => {
              const profit = (d.revenue||0) - (d.expenses||0);
              const maxProfit = Math.max(...chartData.map(x => Math.abs((x.revenue||0)-(x.expenses||0))), 1);
              return (
                <div key={i} className="flex items-center gap-2 text-sm">
                  <span className="w-12 text-xs text-gray-500 text-left">{d.month_name?.substring(0,5)}</span>
                  <div className="flex-1 bg-gray-100 rounded-full h-5 overflow-hidden">
                    <div className="h-full rounded-full transition-all" style={{width: `${Math.max(Math.abs(profit)/maxProfit*100, 3)}%`, background: profit >= 0 ? '#2D8B4E' : '#e74c3c'}}></div>
                  </div>
                  <span className={`text-xs font-bold w-20 text-left ${profit >= 0 ? 'text-green-600' : 'text-red-500'}`}>{formatMoney(profit)}</span>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================
// STUDENTS PAGE
// ============================================
function StudentsPage() {
  const showToast = useContext(ToastContext);
  const { activeYear } = useContext(YearContext);
  const { user } = useContext(AuthContext);
  const hasPerm = (k) => user.role==='admin' || (user.permissions && user.permissions[k]);
  const [students, setStudents] = useState([]);
  const [grades, setGrades] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [showModal, setShowModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const [delWarning, setDelWarning] = useState(null);
  const [delStep, setDelStep] = useState(0);
  const [form, setForm] = useState({ full_name:'', grade_level_id:'', student_phone:'', parent_phone:'' });
  const [page, setPage] = useState(1);
  // Registration modal
  const [showRegModal, setShowRegModal] = useState(false);
  const [regStudent, setRegStudent] = useState(null);
  const [subjects, setSubjects] = useState([]);
  const [teachers, setTeachers] = useState([]);
  const [registrations, setRegistrations] = useState([]);
  const [regForm, setRegForm] = useState({ subject_id:'', teacher_id:'', total_tuition:'' });

  useEffect(() => { loadData(); }, [activeYear]);

  const loadData = async () => {
    setLoading(true);
    const [sRes, gRes, subRes, tRes] = await Promise.all([
      supabase.from('students').select('*,grade_levels(name)').eq('academic_year_id', activeYear?.id).eq('is_active', true).order('created_at', {ascending:false}),
      supabase.from('grade_levels').select('*').eq('is_active', true).order('sort_order', {ascending:true}),
      supabase.from('subjects').select('*').eq('is_active', true).order('sort_order', {ascending:true}),
      supabase.from('teachers').select('*,teacher_subjects(subject_id)').eq('is_active', true)
    ]);
    setStudents(sRes.data || []);
    setGrades(gRes.data || []);
    setSubjects(subRes.data || []);
    setTeachers(tRes.data || []);
    setLoading(false);
  };

  const validatePhone = (phone) => !phone || /^07[3-9]\d{8}$/.test(phone);
  const handleSave = async () => {
    if(!form.full_name?.trim()) { showToast('يرجى إدخال اسم الطالب', 'error'); return; }
    if(form.student_phone && !validatePhone(form.student_phone)) { showToast('رقم هاتف الطالب غير صحيح (يجب أن يبدأ بـ 07 ويتكون من 11 رقم)', 'error'); return; }
    if(form.parent_phone && !validatePhone(form.parent_phone)) { showToast('رقم هاتف ولي الأمر غير صحيح', 'error'); return; }
    if(editing) {
      const { error } = await supabase.from('students').update({...form, full_name: form.full_name.trim(), updated_by: user.user_id, updated_at: new Date().toISOString()}).eq('id', editing.id);
      if(error) { showToast('خطأ في التحديث', 'error'); return; }
      logAudit(user, 'تعديل طالب', 'students', editing.id, form.full_name.trim());
      showToast('تم تحديث بيانات الطالب');
    } else {
      const { error } = await supabase.from('students').insert({...form, full_name: form.full_name.trim(), academic_year_id: activeYear.id});
      if(error) { showToast('خطأ في الإضافة', 'error'); return; }
      logAudit(user, 'إضافة طالب', 'students', null, form.full_name.trim());
      showToast('تم إضافة الطالب بنجاح');
    }
    setShowModal(false); setEditing(null); setForm({ full_name:'', grade_level_id:'', student_phone:'', parent_phone:'' });
    loadData();
  };

  const tryDelete = async (studentId) => {
    // Check if student has any transactions
    const [regsRes, reservRes, paysRes] = await Promise.all([
      supabase.from('registrations').select('id,remaining_balance,total_paid,subjects(name_ar)').eq('student_id', studentId).eq('is_active', true),
      supabase.from('seat_reservations').select('id,amount').eq('student_id', studentId).eq('is_deleted', false),
      supabase.from('payments').select('id,total_amount').eq('student_id', studentId).eq('is_deleted', false)
    ]);
    const regs = regsRes.data || [];
    const reservs = reservRes.data || [];
    const pays = paysRes.data || [];
    const totalOutstanding = regs.reduce((s,r) => s + (r.remaining_balance||0), 0);
    const totalPaid = regs.reduce((s,r) => s + (r.total_paid||0), 0);
    const totalReservations = reservs.reduce((s,r) => s + r.amount, 0);
    const totalPayments = pays.reduce((s,r) => s + r.total_amount, 0);
    const hasData = regs.length > 0 || reservs.length > 0 || pays.length > 0;

    if(hasData) {
      setDelWarning({ studentId, regs, totalOutstanding, totalPaid, totalReservations, totalPayments, numRegs: regs.length, numReservs: reservs.length, numPays: pays.length });
      setDelStep(1);
    } else {
      setConfirmDel(studentId);
    }
  };

  const handleDelete = async () => {
    const sid = confirmDel || delWarning?.studentId;
    // Deactivate student
    const { error } = await supabase.from('students').update({ is_active: false, deleted_by: user.user_id, deleted_at: new Date().toISOString() }).eq('id', sid);
    if(error) { showToast('خطأ في حذف الطالب', 'error'); return; }
    // Deactivate registrations and zero out
    await supabase.from('registrations').update({ is_active: false, total_tuition: 0, total_paid: 0, updated_at: new Date().toISOString() }).eq('student_id', sid);
    logAudit(user, 'حذف طالب', 'students', sid);
    setConfirmDel(null); setDelWarning(null); setDelStep(0);
    showToast('تم حذف الطالب وتصفير أرصدته'); loadData();
  };

  const openEdit = (s) => {
    setEditing(s);
    setForm({ full_name: s.full_name, grade_level_id: s.grade_level_id||'', student_phone: s.student_phone||'', parent_phone: s.parent_phone||'' });
    setShowModal(true);
  };

  const openRegs = async (s) => {
    setRegStudent(s);
    const { data } = await supabase.from('registrations').select('*,subjects(name_ar),teachers(full_name)').eq('student_id', s.id).eq('is_active', true);
    setRegistrations(data || []);
    setShowRegModal(true);
  };

  const addRegistration = async () => {
    if(!regForm.subject_id || !regForm.teacher_id || !regForm.total_tuition) { showToast('يرجى ملء جميع الحقول', 'error'); return; }
    const total = parseInt(regForm.total_tuition);
    if(!total || total <= 0 || isNaN(total)) { showToast('يرجى إدخال مبلغ صحيح أكبر من صفر', 'error'); return; }
    // Check duplicate registration
    const existingReg = registrations.find(r => r.subject_id === regForm.subject_id && r.teacher_id === regForm.teacher_id);
    if(existingReg) { showToast('هذا الطالب مسجل بالفعل في هذه المادة مع نفس الأستاذ', 'error'); return; }
    const teacher = teachers.find(t=>t.id===regForm.teacher_id);
    let instShare = teacher.commission_type==='percentage' ? Math.round(total * teacher.commission_value / 100) : teacher.commission_value;
    let teacherShare = total - instShare;
    const { error } = await supabase.from('registrations').insert({
      student_id: regStudent.id, subject_id: regForm.subject_id, teacher_id: regForm.teacher_id,
      academic_year_id: activeYear.id, total_tuition: total, institute_share: instShare, teacher_share: teacherShare
    });
    if(error) { showToast('خطأ في التسجيل', 'error'); return; }
    showToast('تم تسجيل المادة بنجاح');
    setRegForm({ subject_id:'', teacher_id:'', total_tuition:'' });
    const { data } = await supabase.from('registrations').select('*,subjects(name_ar),teachers(full_name)').eq('student_id', regStudent.id).eq('is_active', true);
    setRegistrations(data || []);
  };

  const filtered = students.filter(s => !search || s.full_name?.includes(search) || (s.student_phone||'').includes(search));
  useEffect(() => { setPage(1); }, [search]);

  if(loading) return <Loading/>;

  return (
    <div className="fade-in">
      <PageHeader title="الطلاب" action={hasPerm('students.add') ? ()=>{setEditing(null);setForm({full_name:'',grade_level_id:'',student_phone:'',parent_phone:''});setShowModal(true)} : null} actionLabel="إضافة طالب"/>
      <div className="card p-4 mb-4">
        <SearchInput value={search} onChange={setSearch} placeholder="بحث بالاسم أو رقم الهاتف..."/>
      </div>
      <div className="card table-container">
        <table>
          <thead><tr><th>#</th><th>الاسم</th><th>المرحلة</th><th>هاتف الطالب</th><th>هاتف ولي الأمر</th><th>تاريخ التسجيل</th><th>إجراءات</th></tr></thead>
          <tbody>
            {paginate(filtered, page).map((s, i) => (
              <tr key={s.id}>
                <td>{(page-1)*ITEMS_PER_PAGE + i+1}</td>
                <td className="font-medium">{s.full_name}</td>
                <td>{s.grade_levels?.name || '-'}</td>
                <td>{s.student_phone || '-'}</td>
                <td>{s.parent_phone || '-'}</td>
                <td>{formatDate(s.registration_date)}</td>
                <td>
                  <div className="flex gap-2">
                    <button onClick={()=>openRegs(s)} className="text-primary-600 hover:text-primary-800" title="المواد">{Icons.eye}</button>
                    {hasPerm('students.edit') && <button onClick={()=>openEdit(s)} className="text-blue-600 hover:text-blue-800">{Icons.edit}</button>}
                    {hasPerm('students.delete') && <button onClick={()=>tryDelete(s.id)} className="text-red-500 hover:text-red-700">{Icons.trash}</button>}
                  </div>
                </td>
              </tr>
            ))}
            {filtered.length===0 && <tr><td colSpan="7" className="text-center py-8 text-gray-400">لا يوجد طلاب</td></tr>}
          </tbody>
        </table>
        <Pagination total={filtered.length} page={page} setPage={setPage}/>
      </div>
      {/* Add/Edit Modal */}
      <Modal isOpen={showModal} onClose={()=>setShowModal(false)} title={editing?'تعديل بيانات الطالب':'إضافة طالب جديد'}>
        <div className="space-y-4">
          <div><label className="block text-sm font-medium mb-1">الاسم الثلاثي *</label><input className="input-field" value={form.full_name} onChange={e=>setForm({...form,full_name:e.target.value})}/></div>
          <div><label className="block text-sm font-medium mb-1">المرحلة الدراسية</label>
            <select className="input-field" value={form.grade_level_id} onChange={e=>setForm({...form,grade_level_id:e.target.value})}>
              <option value="">اختر المرحلة</option>
              {grades.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
            </select>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div><label className="block text-sm font-medium mb-1">هاتف الطالب</label><input className="input-field" value={form.student_phone} onChange={e=>setForm({...form,student_phone:e.target.value})}/></div>
            <div><label className="block text-sm font-medium mb-1">هاتف ولي الأمر</label><input className="input-field" value={form.parent_phone} onChange={e=>setForm({...form,parent_phone:e.target.value})}/></div>
          </div>
          <div className="flex gap-3 pt-2"><button className="btn-primary" onClick={handleSave}>{editing?'تحديث':'إضافة'}</button><button className="btn-ghost" onClick={()=>setShowModal(false)}>إلغاء</button></div>
        </div>
      </Modal>
      {/* Registrations Modal */}
      <Modal isOpen={showRegModal} onClose={()=>setShowRegModal(false)} title={`مواد الطالب: ${regStudent?.full_name||''}`} wide>
        <div className="mb-4">
          <table><thead><tr><th>المادة</th><th>الأستاذ</th><th>القسط الكلي</th><th>حصة المعهد</th><th>حصة الأستاذ</th><th>المدفوع</th><th>المتبقي</th></tr></thead>
            <tbody>
              {registrations.map(r=>(
                <tr key={r.id}>
                  <td>{r.subjects?.name_ar}</td><td>{r.teachers?.full_name}</td>
                  <td>{formatMoney(r.total_tuition)}</td><td>{formatMoney(r.institute_share)}</td><td>{formatMoney(r.teacher_share)}</td>
                  <td className="text-green-600 font-medium">{formatMoney(r.total_paid)}</td>
                  <td className="text-red-500 font-medium">{formatMoney(r.remaining_balance)}</td>
                </tr>
              ))}
              {registrations.length===0 && <tr><td colSpan="7" className="text-center py-4 text-gray-400">لا توجد مواد مسجلة</td></tr>}
            </tbody>
          </table>
        </div>
        {hasPerm('students.add') && (
          <div className="border-t pt-4">
            <h4 className="font-bold text-gray-700 mb-3">تسجيل مادة جديدة</h4>
            <div className="grid grid-cols-1 sm:grid-cols-4 gap-3">
              <select className="input-field" value={regForm.subject_id} onChange={e=>setRegForm({...regForm,subject_id:e.target.value})}>
                <option value="">المادة</option>{subjects.map(s=><option key={s.id} value={s.id}>{s.name_ar}</option>)}
              </select>
              <select className="input-field" value={regForm.teacher_id} onChange={e=>setRegForm({...regForm,teacher_id:e.target.value})}>
                <option value="">الأستاذ</option>{teachers.filter(t=> !regForm.subject_id || t.teacher_subjects?.some(ts=>ts.subject_id===regForm.subject_id)).map(t=><option key={t.id} value={t.id}>{t.full_name}</option>)}
              </select>
              <input className="input-field" type="number" placeholder="القسط الكلي (د.ع)" value={regForm.total_tuition} onChange={e=>setRegForm({...regForm,total_tuition:e.target.value})}/>
              <button className="btn-accent" onClick={addRegistration}>تسجيل</button>
            </div>
          </div>
        )}
      </Modal>
      <ConfirmDialog isOpen={!!confirmDel} onConfirm={handleDelete} onCancel={()=>setConfirmDel(null)} message="هل أنت متأكد من حذف هذا الطالب؟"/>
      {/* Step 1: Warning about student data */}
      <Modal isOpen={delStep===1} onClose={()=>{setDelStep(0);setDelWarning(null)}} title="⚠️ تنبيه: الطالب لديه حسابات!">
        {delWarning && <div className="space-y-3">
          <div className="bg-red-50 border-2 border-red-300 rounded-lg p-4 text-center">
            <p className="text-red-700 font-bold text-lg mb-2">هذا الطالب لديه بيانات مسجلة!</p>
            <div className="text-sm text-red-600 space-y-1">
              {delWarning.numRegs > 0 && <p>مواد مسجلة: <b>{delWarning.numRegs}</b> مادة</p>}
              {delWarning.totalPaid > 0 && <p>إجمالي المدفوع: <b>{formatMoney(delWarning.totalPaid)} د.ع</b></p>}
              {delWarning.totalOutstanding > 0 && <p>أرصدة متبقية: <b className="text-red-800">{formatMoney(delWarning.totalOutstanding)} د.ع</b></p>}
              {delWarning.numReservs > 0 && <p>حجوزات: <b>{delWarning.numReservs}</b> وصل</p>}
              {delWarning.numPays > 0 && <p>دفعات: <b>{delWarning.numPays}</b> وصل</p>}
            </div>
          </div>
          <p className="text-center text-gray-600 text-sm">عند الحذف سيتم تصفير جميع الأرصدة المعلقة.</p>
          <div className="flex gap-3 justify-center pt-2">
            <button className="btn-primary bg-red-600 hover:bg-red-700" onClick={()=>setDelStep(2)}>متأكد، أريد الحذف</button>
            <button className="btn-ghost" onClick={()=>{setDelStep(0);setDelWarning(null)}}>إلغاء</button>
          </div>
        </div>}
      </Modal>
      {/* Step 2: Final confirmation */}
      <Modal isOpen={delStep===2} onClose={()=>{setDelStep(0);setDelWarning(null)}} title="⛔ تأكيد نهائي للحذف">
        <div className="space-y-4">
          <div className="bg-yellow-50 border-2 border-yellow-400 rounded-lg p-4 text-center">
            <p className="text-2xl mb-2">⚠️</p>
            <p className="text-yellow-800 font-bold">هل أنت متأكد تماماً؟</p>
            <p className="text-yellow-700 text-sm mt-1">هذه العملية ستحذف الطالب وتصفّر جميع أرصدته. لا يمكن التراجع عنها!</p>
          </div>
          <div className="flex gap-3 justify-center pt-2">
            <button className="btn-primary bg-red-700 hover:bg-red-800" onClick={handleDelete}>نعم، احذف نهائياً</button>
            <button className="btn-ghost" onClick={()=>{setDelStep(0);setDelWarning(null)}}>لا، تراجع</button>
          </div>
        </div>
      </Modal>
    </div>
  );
}

// ============================================
// TEACHERS PAGE
// ============================================
function TeachersPage() {
  const showToast = useContext(ToastContext);
  const { user } = useContext(AuthContext);
  const hasPerm = (k) => user.role==='admin' || (user.permissions && user.permissions[k]);
  const [teachers, setTeachers] = useState([]);
  const [subjects, setSubjects] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [showModal, setShowModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const [form, setForm] = useState({ full_name:'', phone:'', commission_type:'percentage', commission_value:'', subject_ids:[] });

  useEffect(() => { loadData(); }, []);

  const loadData = async () => {
    setLoading(true);
    const [tRes, sRes] = await Promise.all([
      supabase.from('teachers').select('*,teacher_subjects(subject_id,subjects(name_ar))').eq('is_active', true).order('created_at', {ascending:false}),
      supabase.from('subjects').select('*').eq('is_active', true).order('sort_order', {ascending:true})
    ]);
    setTeachers(tRes.data || []);
    setSubjects(sRes.data || []);
    setLoading(false);
  };

  const handleSave = async () => {
    if(!form.full_name?.trim()) { showToast('يرجى إدخال اسم الأستاذ', 'error'); return; }
    const commVal = parseInt(form.commission_value);
    if(!commVal || commVal <= 0 || isNaN(commVal)) { showToast('يرجى إدخال قيمة عمولة صحيحة أكبر من صفر', 'error'); return; }
    if(form.commission_type === 'percentage' && commVal > 100) { showToast('نسبة العمولة لا يمكن أن تتجاوز 100%', 'error'); return; }
    if(form.phone && !/^07[3-9]\d{8}$/.test(form.phone)) { showToast('رقم الهاتف غير صحيح (يجب أن يبدأ بـ 07 ويتكون من 11 رقم)', 'error'); return; }
    const payload = { full_name: form.full_name.trim(), phone: form.phone, commission_type: form.commission_type, commission_value: commVal };
    if(editing) {
      const { error } = await supabase.from('teachers').update({...payload, updated_by: user.user_id, updated_at: new Date().toISOString()}).eq('id', editing.id);
      if(error) { showToast('خطأ في التحديث', 'error'); return; }
      await supabase.from('teacher_subjects').delete().eq('teacher_id', editing.id);
      if(form.subject_ids.length) await supabase.from('teacher_subjects').insert(form.subject_ids.map(sid=>({teacher_id:editing.id, subject_id:sid})));
      logAudit(user, 'تعديل أستاذ', 'teachers', editing.id, form.full_name.trim());
      showToast('تم تحديث بيانات الأستاذ');
    } else {
      const { data, error } = await supabase.from('teachers').insert(payload).select().single();
      if(error || !data) { showToast('خطأ في الإضافة', 'error'); return; }
      if(form.subject_ids.length) await supabase.from('teacher_subjects').insert(form.subject_ids.map(sid=>({teacher_id:data.id, subject_id:sid})));
      logAudit(user, 'إضافة أستاذ', 'teachers', data.id, form.full_name.trim());
      showToast('تم إضافة الأستاذ بنجاح');
    }
    setShowModal(false); setEditing(null); loadData();
  };

  const handleDelete = async () => {
    const { error } = await supabase.from('teachers').update({ is_active: false, deleted_by: user.user_id, deleted_at: new Date().toISOString() }).eq('id', confirmDel);
    if(error) { showToast('خطأ في حذف الأستاذ', 'error'); return; }
    logAudit(user, 'حذف أستاذ', 'teachers', confirmDel);
    setConfirmDel(null); showToast('تم حذف الأستاذ'); loadData();
  };

  const openEdit = (t) => {
    setEditing(t);
    setForm({ full_name:t.full_name, phone:t.phone||'', commission_type:t.commission_type, commission_value:t.commission_value+'', subject_ids: (t.teacher_subjects||[]).map(ts=>ts.subject_id) });
    setShowModal(true);
  };

  const toggleSubject = (sid) => {
    setForm(f => ({ ...f, subject_ids: f.subject_ids.includes(sid) ? f.subject_ids.filter(id=>id!==sid) : [...f.subject_ids, sid] }));
  };

  const filtered = teachers.filter(t => !search || t.full_name?.includes(search) || (t.phone||'').includes(search));

  if(loading) return <Loading/>;

  return (
    <div className="fade-in">
      <PageHeader title="الأساتذة" action={hasPerm('teachers.add') ? ()=>{setEditing(null);setForm({full_name:'',phone:'',commission_type:'percentage',commission_value:'',subject_ids:[]});setShowModal(true)} : null} actionLabel="إضافة أستاذ"/>
      <div className="card p-4 mb-4"><SearchInput value={search} onChange={setSearch} placeholder="بحث بالاسم أو الهاتف..."/></div>
      <div className="card table-container">
        <table>
          <thead><tr><th>#</th><th>الاسم</th><th>الهاتف</th><th>المواد</th><th>نوع العمولة</th><th>القيمة</th><th>إجراءات</th></tr></thead>
          <tbody>
            {filtered.map((t,i) => (
              <tr key={t.id}>
                <td>{i+1}</td>
                <td className="font-medium">{t.full_name}</td>
                <td>{t.phone || '-'}</td>
                <td><div className="flex flex-wrap gap-1">{(t.teacher_subjects||[]).map(ts=><span key={ts.subject_id} className="badge bg-primary-50 text-primary-700">{ts.subjects?.name_ar}</span>)}</div></td>
                <td>{t.commission_type==='percentage'?'نسبة مئوية':'مبلغ ثابت'}</td>
                <td>{t.commission_type==='percentage'?t.commission_value+'%':formatMoney(t.commission_value)+' د.ع'}</td>
                <td>
                  <div className="flex gap-2">
                    {hasPerm('teachers.edit') && <button onClick={()=>openEdit(t)} className="text-blue-600">{Icons.edit}</button>}
                    {hasPerm('teachers.delete') && <button onClick={()=>setConfirmDel(t.id)} className="text-red-500">{Icons.trash}</button>}
                  </div>
                </td>
              </tr>
            ))}
            {filtered.length===0 && <tr><td colSpan="7" className="text-center py-8 text-gray-400">لا يوجد أساتذة</td></tr>}
          </tbody>
        </table>
      </div>
      <Modal isOpen={showModal} onClose={()=>setShowModal(false)} title={editing?'تعديل بيانات الأستاذ':'إضافة أستاذ جديد'}>
        <div className="space-y-4">
          <div><label className="block text-sm font-medium mb-1">الاسم الكامل *</label><input className="input-field" value={form.full_name} onChange={e=>setForm({...form,full_name:e.target.value})}/></div>
          <div><label className="block text-sm font-medium mb-1">رقم الهاتف</label><input className="input-field" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})}/></div>
          <div className="grid grid-cols-2 gap-3">
            <div><label className="block text-sm font-medium mb-1">نوع حصة المعهد *</label>
              <select className="input-field" value={form.commission_type} onChange={e=>setForm({...form,commission_type:e.target.value})}>
                <option value="percentage">نسبة مئوية</option><option value="fixed">مبلغ ثابت</option>
              </select>
            </div>
            <div><label className="block text-sm font-medium mb-1">{form.commission_type==='percentage'?'النسبة (%)':'المبلغ (د.ع)'} *</label>
              <input className="input-field" type="number" value={form.commission_value} onChange={e=>setForm({...form,commission_value:e.target.value})}/>
            </div>
          </div>
          <div><label className="block text-sm font-medium mb-2">المواد التي يدرسها</label>
            <div className="flex flex-wrap gap-2">
              {subjects.map(s=>(
                <button key={s.id} onClick={()=>toggleSubject(s.id)}
                  className={`px-3 py-1 rounded-full text-sm border transition ${form.subject_ids.includes(s.id)?'bg-primary-600 text-white border-primary-600':'bg-white text-gray-600 border-gray-300 hover:border-primary-400'}`}>
                  {s.name_ar}
                </button>
              ))}
            </div>
          </div>
          <div className="flex gap-3 pt-2"><button className="btn-primary" onClick={handleSave}>{editing?'تحديث':'إضافة'}</button><button className="btn-ghost" onClick={()=>setShowModal(false)}>إلغاء</button></div>
        </div>
      </Modal>
      <ConfirmDialog isOpen={!!confirmDel} onConfirm={handleDelete} onCancel={()=>setConfirmDel(null)} message="هل أنت متأكد من حذف هذا الأستاذ؟"/>
    </div>
  );
}

// ============================================
// SEAT RESERVATIONS PAGE
// ============================================
function ReservationsPage() {
  const showToast = useContext(ToastContext);
  const { activeYear } = useContext(YearContext);
  const { user } = useContext(AuthContext);
  const hasPerm = (k) => user.role==='admin' || (user.permissions && user.permissions[k]);
  const [reservations, setReservations] = useState([]);
  const [students, setStudents] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [dateFrom, setDateFrom] = useState('');
  const [dateTo, setDateTo] = useState('');
  const [showModal, setShowModal] = useState(false);
  const [form, setForm] = useState({ student_id:'', items:[], notes:'', receipt_date: todayStr() });
  const [studentRegs, setStudentRegs] = useState([]);
  const [printData, setPrintData] = useState(null);
  const [editing, setEditing] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const [page, setPage] = useState(1);

  useEffect(() => { loadData(); }, [activeYear]);
  useEffect(() => { setPage(1); }, [search, dateFrom, dateTo]);

  const loadData = async () => {
    setLoading(true);
    const [rRes, sRes] = await Promise.all([
      supabase.from('seat_reservations').select('*,students(full_name,grade_levels(name)),seat_reservation_items(*),creator:profiles!created_by(full_name)').eq('academic_year_id', activeYear?.id).eq('is_deleted', false).order('created_at', {ascending:false}),
      supabase.from('students').select('*').eq('academic_year_id', activeYear?.id).eq('is_active', true)
    ]);
    setReservations(rRes.data || []);
    setStudents(sRes.data || []);
    setLoading(false);
  };

  const onStudentSelect = async (sid) => {
    setForm(f=>({...f, student_id: sid, items:[]}));
    if(sid) {
      const { data } = await supabase.from('registrations').select('*,subjects(name_ar),teachers(full_name)').eq('student_id', sid).eq('is_active', true);
      setStudentRegs(data || []);
    } else setStudentRegs([]);
  };

  const toggleSubjectItem = (reg) => {
    setForm(f => {
      const exists = f.items.find(i => i.registration_id === reg.id);
      if(exists) return {...f, items: f.items.filter(i => i.registration_id !== reg.id)};
      return {...f, items: [...f.items, { registration_id: reg.id, subject_name: reg.subjects?.name_ar||'', teacher_name: reg.teachers?.full_name||'', amount: '' }]};
    });
  };

  const updateItemAmount = (regId, amount) => {
    setForm(f => ({...f, items: f.items.map(i => i.registration_id === regId ? {...i, amount} : i)}));
  };

  const totalAmount = form.items.reduce((s,i) => s + (parseInt(i.amount)||0), 0);

  const openAdd = () => { setEditing(null); setForm({student_id:'', items:[], notes:'', receipt_date:todayStr()}); setStudentRegs([]); setShowModal(true); };

  const openEdit = async (r) => {
    setEditing(r);
    const items = (r.seat_reservation_items||[]).map(it => ({
      registration_id: it.registration_id||'', subject_name: it.subject_name||'', teacher_name: it.teacher_name||'', amount: String(it.amount||'')
    }));
    // If old format (no items), create one item from parent
    if(items.length === 0 && r.amount) {
      items.push({ registration_id: r.registration_id||'', subject_name: '', teacher_name: '', amount: String(r.amount) });
    }
    setForm({ student_id: r.student_id, items, notes: r.notes||'', receipt_date: r.receipt_date||todayStr() });
    if(r.student_id) {
      const { data } = await supabase.from('registrations').select('*,subjects(name_ar),teachers(full_name)').eq('student_id', r.student_id).eq('is_active', true);
      setStudentRegs(data || []);
    }
    setShowModal(true);
  };

  const handleDelete = async () => {
    const { error } = await supabase.from('seat_reservations').update({ is_deleted: true, deleted_by: user.user_id, deleted_at: new Date().toISOString() }).eq('id', confirmDel);
    if(error) { showToast('خطأ في حذف الوصل', 'error'); return; }
    logAudit(user, 'حذف وصل حجز', 'seat_reservations', confirmDel);
    showToast('تم مسح الوصل'); setConfirmDel(null); loadData();
  };

  const handleSave = async () => {
    if(!form.student_id) { showToast('يرجى اختيار الطالب', 'error'); return; }
    const hasInvalid = form.items.some(i => i.amount && (isNaN(parseInt(i.amount)) || parseInt(i.amount) < 0));
    if(hasInvalid) { showToast('يوجد مبلغ غير صحيح في أحد المواد', 'error'); return; }
    const validItems = form.items.filter(i => parseInt(i.amount) > 0);
    if(validItems.length === 0) { showToast('يرجى إضافة مادة واحدة على الأقل مع المبلغ', 'error'); return; }
    const total = validItems.reduce((s,i) => s + parseInt(i.amount), 0);
    if(total <= 0 || isNaN(total)) { showToast('المبلغ الإجمالي غير صحيح', 'error'); return; }

    if(editing) {
      const { error } = await supabase.rpc('update_reservation_items', {
        p_reservation_id: editing.id, p_total_amount: total, p_notes: form.notes || '', p_receipt_date: form.receipt_date, p_updated_by: user.user_id,
        p_items: validItems.map(i=>({ registration_id: i.registration_id||null, subject_name: i.subject_name, teacher_name: i.teacher_name, amount: parseInt(i.amount) }))
      });
      if(error) { showToast('خطأ في التحديث: ' + (error.message||''), 'error'); return; }
      logAudit(user, 'تعديل وصل حجز', 'seat_reservations', editing.id, formatMoney(total)+' د.ع');
      showToast('تم تحديث وصل الحجز'); setShowModal(false); setEditing(null); loadData(); return;
    }

    const { data: rcpt } = await supabase.rpc('generate_receipt_number', { p_year_id: activeYear.id, p_type: 'RES' });
    const receiptNum = Array.isArray(rcpt) ? rcpt[0] : rcpt;
    const { data, error } = await supabase.from('seat_reservations').insert({
      receipt_number: receiptNum, student_id: form.student_id,
      academic_year_id: activeYear.id, amount: total, notes: form.notes, receipt_date: form.receipt_date, created_by: user.user_id
    }).select('*,students(full_name,grade_levels(name)),seat_reservation_items(*),creator:profiles!created_by(full_name)').single();
    if(error) { showToast('خطأ في الحفظ: ' + (error.message||''), 'error'); return; }

    // Insert items
    if(data) {
      await supabase.from('seat_reservation_items').insert(validItems.map(i=>({
        reservation_id: data.id, registration_id: i.registration_id||null,
        subject_name: i.subject_name, teacher_name: i.teacher_name, amount: parseInt(i.amount)
      })));
    }
    logAudit(user, 'إنشاء وصل حجز', 'seat_reservations', data?.id, receiptNum+' - '+formatMoney(total)+' د.ع');
    showToast('تم إنشاء وصل الحجز بنجاح');
    setShowModal(false);
    loadData();
    if(data) setPrintData({...data, seat_reservation_items: validItems.map(i=>({...i, amount: parseInt(i.amount)}))});
  };

  const getSubjectsText = (r) => {
    const items = r.seat_reservation_items || [];
    if(items.length > 0) return items.map(i => i.subject_name || '-').join('، ');
    if(r.registrations?.subjects?.name_ar) return r.registrations.subjects.name_ar;
    return '-';
  };

  const filtered = reservations.filter(r => {
    const matchSearch = !search || r.students?.full_name?.includes(search) || (r.receipt_number||'').includes(search);
    const d = r.receipt_date; const matchFrom = !dateFrom || d >= dateFrom; const matchTo = !dateTo || d <= dateTo;
    return matchSearch && matchFrom && matchTo;
  });
  const handleExport = () => {
    exportToExcel(filtered.map(r => [r.receipt_number, r.students?.full_name, getSubjectsText(r), r.amount, r.notes||'', r.receipt_date, r.creator?.full_name||'']),
    ['رقم الوصل','الطالب','المواد','المبلغ','ملاحظات','التاريخ','بواسطة'], 'حجوزات_المقاعد');
  };

  if(loading) return <Loading/>;

  return (
    <div className="fade-in">
      <PageHeader title="حجز المقاعد" action={hasPerm('reservations.add') ? openAdd : null} actionLabel="وصل حجز جديد"/>
      <div className="card p-4 mb-4 space-y-3">
        <div className="flex items-center gap-3 flex-wrap">
          <div className="flex-1 min-w-[200px]"><SearchInput value={search} onChange={setSearch} placeholder="بحث بالاسم أو رقم الوصل..."/></div>
          <ExportBtn onClick={handleExport}/>
        </div>
        <DateRangeFilter dateFrom={dateFrom} dateTo={dateTo} setDateFrom={setDateFrom} setDateTo={setDateTo}/>
      </div>
      <div className="card table-container">
        <table>
          <thead><tr><th>رقم الوصل</th><th>الطالب</th><th>المواد</th><th>المبلغ</th><th>ملاحظات</th><th>التاريخ</th><th>بواسطة</th><th>إجراءات</th></tr></thead>
          <tbody>
            {paginate(filtered, page).map(r => (
              <tr key={r.id}>
                <td className="font-mono text-sm">{r.receipt_number}</td>
                <td>{r.students?.full_name}</td>
                <td className="text-sm">{getSubjectsText(r)}</td>
                <td className="font-bold text-accent-600">{formatMoney(r.amount)} د.ع</td>
                <td className="text-xs text-gray-500">{r.notes || '-'}</td>
                <td>{formatDate(r.receipt_date)}</td>
                <td className="text-xs text-gray-500">{r.creator?.full_name || '-'}</td>
                <td><div className="flex gap-2">{hasPerm('reservations.edit') && <button onClick={()=>openEdit(r)} className="text-blue-600">{Icons.edit}</button>}{hasPerm('reservations.delete') && <button onClick={()=>setConfirmDel(r.id)} className="text-red-500">{Icons.trash}</button>}<button onClick={()=>setPrintData(r)} className="text-primary-600">{Icons.print}</button></div></td>
              </tr>
            ))}
            {filtered.length===0 && <tr><td colSpan="8" className="text-center py-8 text-gray-400">لا توجد حجوزات</td></tr>}
          </tbody>
        </table>
        <Pagination total={filtered.length} page={page} setPage={setPage}/>
      </div>
      <Modal isOpen={showModal} onClose={()=>{setShowModal(false);setEditing(null)}} title={editing ? 'تعديل وصل الحجز' : 'وصل حجز مقعد جديد'} wide>
        <div className="space-y-4">
          <div><label className="block text-sm font-medium mb-1">الطالب *</label>
            <SearchableSelect options={students.map(s=>({value:s.id, label:s.full_name}))} value={form.student_id} onChange={v=>onStudentSelect(v)} placeholder="ابحث عن الطالب..."/>
          </div>
          {studentRegs.length > 0 && <div>
            <label className="block text-sm font-medium mb-2">اختر المواد (اضغط على المادة لإضافتها)</label>
            <div className="flex flex-wrap gap-2 mb-3">
              {studentRegs.map(reg => {
                const selected = form.items.find(i => i.registration_id === reg.id);
                return (
                  <button key={reg.id} type="button" onClick={()=>toggleSubjectItem(reg)}
                    className={`px-3 py-2 rounded-lg text-sm border-2 transition ${selected ? 'bg-primary-600 text-white border-primary-600' : 'bg-white text-gray-600 border-gray-300 hover:border-primary-400'}`}>
                    {reg.subjects?.name_ar} - {reg.teachers?.full_name}
                  </button>
                );
              })}
            </div>
            {form.items.length > 0 && <div className="bg-gray-50 rounded-lg p-3 space-y-2">
              <p className="text-sm font-medium text-gray-700 mb-1">المبالغ لكل مادة:</p>
              {form.items.map((item, idx) => (
                <div key={idx} className="flex items-center gap-3">
                  <span className="text-sm flex-1">{item.subject_name} - {item.teacher_name}</span>
                  <input className="input-field w-36" type="number" placeholder="المبلغ" value={item.amount}
                    onChange={e=>updateItemAmount(item.registration_id, e.target.value)}/>
                  <span className="text-xs text-gray-400">د.ع</span>
                </div>
              ))}
              <div className="flex justify-between pt-2 border-t mt-2">
                <span className="font-bold text-sm">المجموع الكلي:</span>
                <span className="font-bold text-primary-700">{formatMoney(totalAmount)} د.ع</span>
              </div>
            </div>}
          </div>}
          {studentRegs.length === 0 && form.student_id && <div className="bg-yellow-50 p-3 rounded-lg text-sm text-yellow-700 text-center">هذا الطالب غير مسجل بأي مادة. يمكنك إضافة مبلغ يدوي أدناه.</div>}
          {(studentRegs.length === 0 && form.student_id) && <div>
            <label className="block text-sm font-medium mb-1">المبلغ (د.ع) *</label>
            <input className="input-field" type="number" value={form.items[0]?.amount||''} onChange={e=>setForm({...form, items:[{registration_id:'', subject_name:'حجز عام', teacher_name:'', amount:e.target.value}]})}/>
          </div>}
          <div><label className="block text-sm font-medium mb-1">التاريخ</label><input className="input-field" type="date" value={form.receipt_date} onChange={e=>setForm({...form,receipt_date:e.target.value})}/></div>
          <div><label className="block text-sm font-medium mb-1">ملاحظات</label><input className="input-field" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="أي ملاحظات إضافية..."/></div>
          <div className="flex gap-3 pt-2"><button className="btn-primary" onClick={handleSave}>{editing ? 'تحديث' : 'إنشاء الوصل'}</button><button className="btn-ghost" onClick={()=>{setShowModal(false);setEditing(null)}}>إلغاء</button></div>
        </div>
      </Modal>
      {printData && <ReceiptPrint type="reservation" data={printData} onClose={()=>setPrintData(null)}/>}
      <ConfirmDialog isOpen={!!confirmDel} onConfirm={handleDelete} onCancel={()=>setConfirmDel(null)} message="هل أنت متأكد من مسح هذا الوصل؟"/>
    </div>
  );
}

// ============================================
// PAYMENTS PAGE
// ============================================
function PaymentsPage() {
  const showToast = useContext(ToastContext);
  const { activeYear } = useContext(YearContext);
  const { user } = useContext(AuthContext);
  const hasPerm = (k) => user.role==='admin' || (user.permissions && user.permissions[k]);
  const [payments, setPayments] = useState([]);
  const [students, setStudents] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [showModal, setShowModal] = useState(false);
  const [form, setForm] = useState({ student_id:'', total_amount:'', allocation_type:'equal', receipt_date: todayStr(), allocations:[] });
  const [studentRegs, setStudentRegs] = useState([]);
  const [printData, setPrintData] = useState(null);
  const [editing, setEditing] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const [page, setPage] = useState(1);
  const [dateFrom, setDateFrom] = useState('');
  const [dateTo, setDateTo] = useState('');
  const [saving, setSaving] = useState(false);

  useEffect(() => { loadData(); }, [activeYear]);
  useEffect(() => { setPage(1); }, [search, dateFrom, dateTo]);

  const loadData = async () => {
    setLoading(true);
    const [pRes, sRes] = await Promise.all([
      supabase.from('payments').select('*,students(full_name),creator:profiles!created_by(full_name)').eq('academic_year_id', activeYear?.id).eq('is_deleted', false).order('created_at', {ascending:false}),
      supabase.from('students').select('*').eq('academic_year_id', activeYear?.id).eq('is_active', true)
    ]);
    setPayments(pRes.data || []);
    setStudents(sRes.data || []);
    setLoading(false);
  };

  const handleDelete = async () => {
    const { error } = await supabase.from('payments').update({ is_deleted: true, deleted_by: user.user_id, deleted_at: new Date().toISOString() }).eq('id', confirmDel);
    if(error) { showToast('خطأ في حذف الوصل', 'error'); return; }
    logAudit(user, 'حذف وصل دفع', 'payments', confirmDel);
    showToast('تم مسح الوصل'); setConfirmDel(null); loadData();
  };

  const onStudentSelect = async (sid) => {
    setForm(f=>({...f, student_id:sid, allocations:[]}));
    if(sid) {
      const { data } = await supabase.from('registrations').select('*,subjects(name_ar),teachers(full_name,commission_type,commission_value)').eq('student_id', sid).eq('is_active', true);
      setStudentRegs(data || []);
    } else setStudentRegs([]);
  };

  const openAdd = () => {
    setEditing(null);
    setForm({student_id:'',total_amount:'',allocation_type:'equal',receipt_date:todayStr(),allocations:[]});
    setStudentRegs([]);
    setShowModal(true);
  };

  const openEdit = async (p) => {
    setEditing(p);
    setForm({student_id:p.student_id, total_amount:String(p.total_amount), allocation_type:p.allocation_type, receipt_date:p.receipt_date||todayStr(), allocations:[]});
    if(p.student_id) {
      const { data } = await supabase.from('registrations').select('*,subjects(name_ar),teachers(full_name,commission_type,commission_value)').eq('student_id', p.student_id).eq('is_active', true);
      setStudentRegs(data || []);
    }
    setShowModal(true);
  };

  const handleSave = async () => {
    if(saving) return;
    if(!form.student_id || !form.total_amount) { showToast('يرجى ملء الحقول المطلوبة', 'error'); return; }
    if(studentRegs.length === 0) { showToast('الطالب غير مسجل في أي مادة', 'error'); return; }
    const total = parseInt(form.total_amount);
    if(!total || total <= 0 || isNaN(total)) { showToast('يرجى إدخال مبلغ صحيح أكبر من صفر', 'error'); return; }

    // Validate manual distribution doesn't exceed total
    if(form.allocation_type === 'manual') {
      const manualSum = form.allocations.reduce((s, a) => s + (parseInt(a.amount)||0), 0);
      if(manualSum > total) {
        showToast('مجموع التوزيع اليدوي (' + formatMoney(manualSum) + ') أكبر من المبلغ الكلي (' + formatMoney(total) + ')', 'error');
        return;
      }
      if(manualSum < total) {
        showToast('مجموع التوزيع اليدوي (' + formatMoney(manualSum) + ') أقل من المبلغ الكلي (' + formatMoney(total) + '). يرجى توزيع كامل المبلغ.', 'error');
        return;
      }
    }

    setSaving(true);
    try {
    let allocs = [];
    const calcInstShare = (amt, reg) => {
      if(!reg || !amt) return 0;
      if(reg.teachers?.commission_type === 'percentage') return Math.round(amt * reg.teachers.commission_value / 100);
      if(reg.total_tuition > 0) return Math.round(amt * reg.institute_share / reg.total_tuition);
      return amt;
    };
    if(form.allocation_type === 'equal') {
      const perSubject = Math.floor(total / studentRegs.length);
      let remainder = total - (perSubject * studentRegs.length);
      allocs = studentRegs.map((r, i) => {
        const amt = perSubject + (i === 0 ? remainder : 0);
        const instShare = calcInstShare(amt, r);
        return { registration_id: r.id, amount: amt, institute_share: instShare, teacher_share: amt - instShare };
      });
    } else {
      allocs = form.allocations.filter(a => a.amount > 0).map(a => {
        const reg = studentRegs.find(r => r.id === a.registration_id);
        const amt = parseInt(a.amount);
        const instShare = calcInstShare(amt, reg);
        return { registration_id: a.registration_id, amount: amt, institute_share: instShare, teacher_share: amt - instShare };
      });
    }

    if(editing) {
      const { error } = await supabase.rpc('update_payment_allocations', {
        p_payment_id: editing.id, p_total_amount: total, p_allocation_type: form.allocation_type, p_receipt_date: form.receipt_date, p_updated_by: user.user_id,
        p_allocations: allocs.map(a=>({ registration_id: a.registration_id, amount: a.amount, institute_amount: a.institute_share, teacher_amount: a.teacher_share }))
      });
      if(error) { showToast('خطأ في التحديث: ' + (error.message||''), 'error'); return; }
      logAudit(user, 'تعديل وصل دفع', 'payments', editing.id, formatMoney(total)+' د.ع');
      showToast('تم تحديث وصل الدفع بنجاح');
    } else {
      const { data: rcpt } = await supabase.rpc('generate_receipt_number', { p_year_id: activeYear.id, p_type: 'PAY' });
      const receiptNum = Array.isArray(rcpt) ? rcpt[0] : rcpt;

      const { data: payment, error } = await supabase.from('payments').insert({
        receipt_number: receiptNum, student_id: form.student_id, academic_year_id: activeYear.id,
        total_amount: total, allocation_type: form.allocation_type, receipt_date: form.receipt_date, created_by: user.user_id
      }).select('*,students(full_name)').single();

      if(error || !payment) { showToast('خطأ في الحفظ', 'error'); return; }

      if(allocs.length > 0) {
        const { error: allocErr } = await supabase.from('payment_allocations').insert(allocs.map(a=>({...a, payment_id: payment.id})));
        if(allocErr) { showToast('خطأ في حفظ التوزيعات', 'error'); return; }
      }
      logAudit(user, 'إنشاء وصل دفع', 'payments', payment.id, receiptNum+' - '+formatMoney(total)+' د.ع');
      showToast('تم إنشاء وصل الدفع بنجاح');
    }
    setShowModal(false);
    setEditing(null);
    loadData();
    } finally { setSaving(false); }
  };

  const filtered = payments.filter(p => {
    const matchSearch = !search || p.students?.full_name?.includes(search) || (p.receipt_number||'').includes(search);
    const d = p.receipt_date; const matchFrom = !dateFrom || d >= dateFrom; const matchTo = !dateTo || d <= dateTo;
    return matchSearch && matchFrom && matchTo;
  });

  const handleExport = () => {
    exportToExcel(filtered.map(p => [p.receipt_number, p.students?.full_name, p.total_amount, p.allocation_type==='equal'?'توزيع متساوي':'توزيع يدوي', p.receipt_date, p.creator?.full_name||'']),
    ['رقم الوصل','الطالب','المبلغ','نوع التوزيع','التاريخ','بواسطة'], 'دفعات_الطلاب');
  };

  if(loading) return <Loading/>;

  return (
    <div className="fade-in">
      <PageHeader title="دفعات الطلاب" action={hasPerm('payments.add') ? openAdd : null} actionLabel="وصل دفع جديد"/>
      <div className="card p-4 mb-4 space-y-3">
        <div className="flex items-center gap-3 flex-wrap">
          <div className="flex-1 min-w-[200px]"><SearchInput value={search} onChange={setSearch}/></div>
          <ExportBtn onClick={handleExport}/>
        </div>
        <DateRangeFilter dateFrom={dateFrom} dateTo={dateTo} setDateFrom={setDateFrom} setDateTo={setDateTo}/>
      </div>
      <div className="card table-container">
        <table>
          <thead><tr><th>رقم الوصل</th><th>الطالب</th><th>المبلغ</th><th>نوع التوزيع</th><th>التاريخ</th><th>بواسطة</th><th>إجراءات</th></tr></thead>
          <tbody>
            {paginate(filtered, page).map(p => (
              <tr key={p.id}>
                <td className="font-mono text-sm">{p.receipt_number}</td>
                <td>{p.students?.full_name}</td>
                <td className="font-bold text-accent-600">{formatMoney(p.total_amount)} د.ع</td>
                <td>{p.allocation_type==='equal'?'توزيع متساوي':'توزيع يدوي'}</td>
                <td>{formatDate(p.receipt_date)}</td>
                <td className="text-xs text-gray-500">{p.creator?.full_name || '-'}</td>
                <td><div className="flex gap-2">{hasPerm('payments.edit') && <button onClick={()=>openEdit(p)} className="text-blue-600">{Icons.edit}</button>}{hasPerm('payments.delete') && <button onClick={()=>setConfirmDel(p.id)} className="text-red-500">{Icons.trash}</button>}<button onClick={()=>setPrintData(p)} className="text-primary-600">{Icons.print}</button></div></td>
              </tr>
            ))}
            {filtered.length===0 && <tr><td colSpan="7" className="text-center py-8 text-gray-400">لا توجد دفعات</td></tr>}
          </tbody>
        </table>
        <Pagination total={filtered.length} page={page} setPage={setPage}/>
      </div>
      <Modal isOpen={showModal} onClose={()=>setShowModal(false)} title={editing ? "تعديل وصل تسديد" : "وصل تسديد قسط جديد"} wide>
        <div className="space-y-4">
          <div><label className="block text-sm font-medium mb-1">الطالب *</label>
            <SearchableSelect options={students.map(s=>({value:s.id, label:s.full_name}))} value={form.student_id} onChange={v=>onStudentSelect(v)} placeholder="ابحث عن الطالب..."/>
          </div>
          {studentRegs.length > 0 && (
            <div className="bg-gray-50 rounded-lg p-3">
              <p className="text-sm text-gray-600 mb-2">المواد المسجلة:</p>
              {studentRegs.map(r=>(
                <div key={r.id} className="flex justify-between text-sm py-1">
                  <span>{r.subjects?.name_ar} - {r.teachers?.full_name}</span>
                  <span>المتبقي: <b className="text-red-500">{formatMoney(r.remaining_balance)} د.ع</b></span>
                </div>
              ))}
            </div>
          )}
          <div className="grid grid-cols-2 gap-3">
            <div><label className="block text-sm font-medium mb-1">المبلغ الكلي (د.ع) *</label><input className="input-field" type="number" value={form.total_amount} onChange={e=>setForm({...form,total_amount:e.target.value})}/></div>
            <div><label className="block text-sm font-medium mb-1">التاريخ</label><input className="input-field" type="date" value={form.receipt_date} onChange={e=>setForm({...form,receipt_date:e.target.value})}/></div>
          </div>
          <div><label className="block text-sm font-medium mb-1">طريقة التوزيع</label>
            <select className="input-field" value={form.allocation_type} onChange={e=>{
              const t = e.target.value;
              setForm(f=>({...f, allocation_type:t, allocations: t==='manual' ? studentRegs.map(r=>({registration_id:r.id, amount:''})) : []}));
            }}>
              <option value="equal">توزيع متساوي على جميع المواد</option>
              <option value="manual">توزيع يدوي</option>
            </select>
          </div>
          {form.allocation_type === 'manual' && <>
            {studentRegs.map((r, i) => (
              <div key={r.id} className="flex items-center gap-3">
                <span className="text-sm flex-1">{r.subjects?.name_ar} - {r.teachers?.full_name}</span>
                <input className="input-field w-40" type="number" placeholder="المبلغ" value={form.allocations[i]?.amount||''} onChange={e=>{
                  const allocs = [...form.allocations];
                  allocs[i] = {...allocs[i], amount: e.target.value};
                  setForm({...form, allocations: allocs});
                }}/>
              </div>
            ))}
            {(() => {
              const manualSum = form.allocations.reduce((s,a) => s+(parseInt(a.amount)||0), 0);
              const total = parseInt(form.total_amount)||0;
              const diff = manualSum - total;
              return <div className={`p-2 rounded-lg text-sm text-center font-bold ${diff === 0 && total > 0 ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-600'}`}>
                مجموع التوزيع: {formatMoney(manualSum)} د.ع / المبلغ الكلي: {formatMoney(total)} د.ع
                {diff > 0 && <span> (زيادة {formatMoney(diff)})</span>}
                {diff < 0 && <span> (متبقي {formatMoney(Math.abs(diff))})</span>}
                {diff === 0 && total > 0 && <span> ✓</span>}
              </div>;
            })()}
          </>}
          <div className="flex gap-3 pt-2"><button className="btn-primary" disabled={saving} onClick={handleSave}>{saving ? 'جاري الحفظ...' : (editing ? 'تحديث الوصل' : 'إنشاء الوصل')}</button><button className="btn-ghost" onClick={()=>setShowModal(false)}>إلغاء</button></div>
        </div>
      </Modal>
      {printData && <ReceiptPrint type="payment" data={printData} onClose={()=>setPrintData(null)}/>}
      <ConfirmDialog isOpen={!!confirmDel} onConfirm={handleDelete} onCancel={()=>setConfirmDel(null)} message="هل أنت متأكد من مسح هذا الوصل؟"/>
    </div>
  );
}

// ============================================
// TEACHER PAYOUTS PAGE
// ============================================
function PayoutsPage() {
  const showToast = useContext(ToastContext);
  const { activeYear } = useContext(YearContext);
  const { user } = useContext(AuthContext);
  const hasPerm = (k) => user.role==='admin' || (user.permissions && user.permissions[k]);
  const [payouts, setPayouts] = useState([]);
  const [teachers, setTeachers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showModal, setShowModal] = useState(false);
  const [form, setForm] = useState({ teacher_id:'', amount:'', payout_date: todayStr(), notes:'' });
  const [teacherBalance, setTeacherBalance] = useState(0);
  const [search, setSearch] = useState('');
  const [editing, setEditing] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const [printData, setPrintData] = useState(null);
  const [page, setPage] = useState(1);
  const [dateFrom, setDateFrom] = useState('');
  const [dateTo, setDateTo] = useState('');

  useEffect(() => { loadData(); }, [activeYear]);
  useEffect(() => { setPage(1); }, [search, dateFrom, dateTo]);

  const loadData = async () => {
    setLoading(true);
    const [pRes, tRes] = await Promise.all([
      supabase.from('teacher_payouts').select('*,teachers(full_name),creator:profiles!created_by(full_name)').eq('academic_year_id', activeYear?.id).eq('is_deleted', false).order('created_at', {ascending:false}),
      supabase.from('teachers').select('*').eq('is_active', true)
    ]);
    setPayouts(pRes.data || []);
    setTeachers(tRes.data || []);
    setLoading(false);
  };

  const handleDelete = async () => {
    const { error } = await supabase.from('teacher_payouts').update({ is_deleted: true, deleted_by: user.user_id, deleted_at: new Date().toISOString() }).eq('id', confirmDel);
    if(error) { showToast('خطأ في حذف الوصل', 'error'); return; }
    logAudit(user, 'حذف وصل صرف', 'teacher_payouts', confirmDel);
    showToast('تم مسح الوصل'); setConfirmDel(null); loadData();
  };

  const onTeacherSelect = async (tid) => {
    setForm(f=>({...f, teacher_id: tid}));
    if(tid) {
      const { data } = await supabase.rpc('get_teacher_balance', { p_teacher_id: tid, p_year_id: activeYear.id });
      setTeacherBalance(typeof data === 'number' ? data : (Array.isArray(data) ? data[0] : 0));
    } else setTeacherBalance(0);
  };

  const openAdd = () => {
    setEditing(null);
    setForm({teacher_id:'',amount:'',payout_date:todayStr(),notes:''});
    setTeacherBalance(0);
    setShowModal(true);
  };

  const openEdit = async (p) => {
    setEditing(p);
    setForm({teacher_id:p.teacher_id, amount:String(p.amount), payout_date:p.payout_date||todayStr(), notes:p.notes||''});
    if(p.teacher_id) {
      const { data } = await supabase.rpc('get_teacher_balance', { p_teacher_id: p.teacher_id, p_year_id: activeYear.id });
      setTeacherBalance(typeof data === 'number' ? data : (Array.isArray(data) ? data[0] : 0));
    }
    setShowModal(true);
  };

  const handleSave = async () => {
    if(!form.teacher_id || !form.amount) { showToast('يرجى ملء الحقول المطلوبة', 'error'); return; }
    const amt = parseInt(form.amount);
    if(!amt || amt <= 0 || isNaN(amt)) { showToast('يرجى إدخال مبلغ صحيح أكبر من صفر', 'error'); return; }

    if(editing) {
      // Recalculate balance_before/balance_after with current teacher balance
      const { data: balData } = await supabase.rpc('get_teacher_balance', { p_teacher_id: form.teacher_id, p_year_id: activeYear.id });
      const currentBal = typeof balData === 'number' ? balData : (Array.isArray(balData) ? balData[0] : 0);
      // Add back the old payout amount to get the "before" balance, then subtract new amount
      const balBefore = currentBal + editing.amount;
      const balAfter = balBefore - amt;
      const { error } = await supabase.from('teacher_payouts').update({
        teacher_id: form.teacher_id, amount: amt, payout_date: form.payout_date, notes: form.notes,
        balance_before: balBefore, balance_after: balAfter, updated_by: user.user_id, updated_at: new Date().toISOString()
      }).eq('id', editing.id);
      if(error) { showToast('خطأ في التحديث', 'error'); return; }
      logAudit(user, 'تعديل وصل صرف', 'teacher_payouts', editing.id, formatMoney(amt)+' د.ع');
      showToast('تم تحديث وصل الصرف بنجاح');
